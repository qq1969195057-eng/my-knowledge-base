<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的知识库 - 可管理分类</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"></script>
<!-- 新增：SmilesDrawer 化学结构渲染库 -->
<script src="https://unpkg.com/smiles-drawer@2.1.7/dist/smiles-drawer.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;background:#f5f5f0;color:#1a1a1a;height:100vh;overflow:hidden}
.app{display:flex;height:100vh}
.sidebar{width:220px;min-width:220px;background:#fff;border-right:1px solid #e8e8e4;display:flex;flex-direction:column}
.sidebar-top{padding:14px 12px 10px;border-bottom:1px solid #e8e8e4}
.app-title{font-size:15px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.search-box{display:flex;align-items:center;gap:6px;background:#f5f5f0;border:1px solid #e0e0db;border-radius:8px;padding:6px 8px}
.search-box input{border:none;background:transparent;font-size:13px;color:#1a1a1a;outline:none;width:100%}
.search-box input::placeholder{color:#aaa}
.section-label{padding:10px 14px 4px;font-size:11px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:0.06em}
.cat-list{padding:0 8px;flex:1;overflow-y:auto}
.cat-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:7px;cursor:pointer;font-size:13px;color:#555;margin-bottom:2px;justify-content:space-between}
.cat-item-left{display:flex;align-items:center;gap:8px;flex:1;overflow:hidden}
.cat-item-left span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cat-item:hover{background:#f5f5f0}
.cat-item.active{background:#f0eefc;color:#4338ca}
.cat-count{margin-left:auto;font-size:11px;color:#bbb;background:#f0f0ec;padding:1px 7px;border-radius:99px;flex-shrink:0}
.cat-item.active .cat-count{background:#e0defa;color:#6366f1}
.cat-delete-btn{background:transparent;border:none;cursor:pointer;font-size:14px;padding:2px 5px;border-radius:20px;color:#aaa;opacity:0;transition:all 0.1s;font-weight:bold;line-height:1}
.cat-item:hover .cat-delete-btn{opacity:0.6}
.cat-delete-btn:hover{opacity:1 !important;color:#ef4444;background:#fee2e2}
.new-btn{margin:10px;padding:8px 12px;background:#4f46e5;color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:inherit;justify-content:center}
.new-btn:hover{background:#4338ca}
.note-list{width:230px;min-width:230px;background:#fafaf8;border-right:1px solid #e8e8e4;display:flex;flex-direction:column}
.list-header{padding:10px 14px;font-size:13px;font-weight:500;border-bottom:1px solid #e8e8e4;display:flex;align-items:center;justify-content:space-between;color:#555}
.note-items{flex:1;overflow-y:auto}
.note-item{padding:10px 14px;border-bottom:1px solid #f0f0ec;cursor:pointer}
.note-item:hover,.note-item.active{background:#f0eefc}
.note-title{font-size:13px;font-weight:500;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#1a1a1a}
.note-preview{font-size:12px;color:#888;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:5px}
.note-meta{display:flex;gap:4px;align-items:center;flex-wrap:wrap}
.tag{font-size:10px;padding:2px 6px;border-radius:99px;background:#ede9fe;color:#4338ca}
.note-date{font-size:10px;color:#bbb;margin-left:auto}
.editor{flex:1;display:flex;flex-direction:column;background:#fff;min-width:0;min-height:0;overflow:hidden}
.toolbar{padding:8px 16px;border-bottom:1px solid #e8e8e4;display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.tb-btn{padding:4px 8px;border:1px solid #e8e8e4;border-radius:6px;background:transparent;font-size:12px;cursor:pointer;color:#555;font-family:inherit}
.tb-btn:hover{background:#f5f5f0}
.tb-btn.active{background:#ede9fe;border-color:#a5b4fc;color:#4338ca}
select.tb-select{padding:4px 8px;border:1px solid #e8e8e4;border-radius:6px;background:#fff;font-size:12px;color:#555;font-family:inherit;cursor:pointer}
.img-upload-btn{padding:4px 10px;border:1px solid #e8e8e4;border-radius:6px;background:transparent;font-size:12px;cursor:pointer;color:#555;font-family:inherit;display:flex;align-items:center;gap:4px}
.img-upload-btn:hover{background:#f5f5f0}
#imgUploadInput{display:none}
/* ── 新增：下载按钮样式（不影响原有样式） ── */
.download-btn{padding:4px 10px;border:1px solid #e8e8e4;border-radius:6px;background:transparent;font-size:12px;cursor:pointer;color:#555;font-family:inherit;display:flex;align-items:center;gap:4px}
.download-btn:hover{background:#f5f5f0;color:#4338ca}
.editor-title{padding:16px 20px 8px;font-size:22px;font-weight:600;border:none;outline:none;background:transparent;color:#1a1a1a;font-family:inherit;width:100%}
.editor-tags{padding:4px 20px 8px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;border-bottom:1px solid #f0f0ec}
.etag{font-size:12px;padding:3px 10px;border-radius:99px;background:#ede9fe;color:#4338ca;display:flex;align-items:center;gap:4px}
.etag-rm{cursor:pointer;opacity:0.5;font-size:14px;line-height:1}
.etag-rm:hover{opacity:1}
.tag-input{font-size:13px;border:none;outline:none;background:transparent;color:#888;min-width:100px;font-family:inherit}
.tag-input::placeholder{color:#ccc}
.editor-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
#editorContent{min-height:0;overflow:hidden}
.edit-pane{flex:1;padding:12px 20px;overflow-y:auto;min-height:0}
.edit-pane textarea{width:100%;height:100%;min-height:300px;border:none;outline:none;resize:none;font-size:14px;line-height:1.9;color:#1a1a1a;background:transparent;font-family:'Menlo','Monaco','Courier New',monospace}
.preview-pane{flex:1;padding:16px 24px;overflow-y:auto;display:none;border-left:1px solid #f0f0ec;min-height:0;height:100%}
.preview-pane.show{display:block}
.math-block{overflow-x:auto;margin:12px 0;padding:8px;background:#f9f9ff;border-radius:6px;text-align:center}
.katex-display{margin:0}
.split-view .edit-pane{flex:1}
.split-view .preview-pane{display:block;flex:1}
/* Markdown preview styles */
.preview-pane h1{font-size:22px;font-weight:700;margin:0 0 12px;color:#1a1a1a;border-bottom:2px solid #e8e8e4;padding-bottom:8px}
.preview-pane h2{font-size:18px;font-weight:600;margin:20px 0 8px;color:#1a1a1a;border-bottom:1px solid #f0f0ec;padding-bottom:4px}
.preview-pane h3{font-size:15px;font-weight:600;margin:16px 0 6px;color:#333}
.preview-pane p{margin:0 0 10px;line-height:1.8;color:#333}
.preview-pane ul,.preview-pane ol{margin:0 0 10px 20px;line-height:1.8;color:#333}
.preview-pane li{margin-bottom:3px}
.preview-pane blockquote{border-left:3px solid #a5b4fc;padding:6px 12px;margin:10px 0;background:#f9f9ff;color:#555;border-radius:0 6px 6px 0}
.preview-pane code{background:#f0f0ec;padding:1px 5px;border-radius:4px;font-family:monospace;font-size:13px;color:#d63384}
.preview-pane pre{background:#f5f5f0;padding:12px;border-radius:8px;overflow-x:auto;margin:10px 0}
.preview-pane pre code{background:none;padding:0;color:#1a1a1a}
.preview-pane img{max-width:100%;border-radius:8px;margin:8px 0;box-shadow:0 2px 8px rgba(0,0,0,0.1);display:block}
.preview-pane strong{font-weight:600;color:#1a1a1a}
.preview-pane em{font-style:italic;color:#555}
.preview-pane hr{border:none;border-top:1px solid #e8e8e4;margin:16px 0}
.preview-pane table{width:100%;border-collapse:collapse;margin:10px 0;font-size:13px}
.preview-pane th{background:#f0eefc;padding:7px 10px;text-align:left;font-weight:600;border:1px solid #e0defa}
.preview-pane td{padding:6px 10px;border:1px solid #e8e8e4}
.preview-pane tr:nth-child(even){background:#f9f9ff}
.editor-footer{padding:8px 20px;border-top:1px solid #e8e8e4;display:flex;align-items:center;justify-content:space-between}
.word-count{font-size:12px;color:#bbb}
.footer-btns{display:flex;gap:8px}
.del-btn{padding:5px 12px;border:1px solid #fca5a5;border-radius:7px;background:transparent;color:#ef4444;font-size:13px;cursor:pointer;font-family:inherit}
.del-btn:hover{background:#fef2f2}
.save-btn{padding:5px 16px;background:#4f46e5;color:#fff;border:none;border-radius:7px;font-size:13px;cursor:pointer;font-family:inherit}
.save-btn:hover{background:#4338ca}
.save-btn.saved{background:#10b981}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#ccc;gap:10px;font-size:14px}
.empty svg{width:40px;height:40px;opacity:0.3}
.loading{text-align:center;padding:20px;color:#bbb;font-size:13px}
.toast{position:fixed;bottom:20px;right:20px;background:#1a1a1a;color:#fff;padding:10px 16px;border-radius:8px;font-size:13px;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:100}
.toast.show{opacity:1}
.upload-progress{font-size:11px;color:#6366f1;padding:2px 6px}
/* ── 新增：化学结构样式 ── */
.chem-block{display:inline-block;background:#f9f9ff;border-radius:8px;padding:6px;margin:4px 2px;border:1px solid #e0defa;text-align:center;vertical-align:middle}
.chem-block canvas{display:block;max-width:100%}
.chem-error{color:#ef4444;font-size:12px;font-family:monospace;background:#fef2f2;padding:4px 8px;border-radius:4px;border:1px solid #fca5a5}
.chem-inline-wrap{display:inline-flex;flex-direction:column;align-items:center;background:#f9f9ff;border-radius:8px;border:1px solid #e0defa;padding:4px 6px;margin:2px 4px;vertical-align:middle;cursor:default}
.chem-inline-wrap canvas{display:block}
.chem-label{font-size:10px;color:#888;font-family:monospace;margin-top:2px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* ── 新增：批量删除笔记样式 ── */
.batch-toggle-btn{font-size:12px;padding:3px 10px;border:1px solid #e8e8e4;border-radius:6px;background:transparent;color:#888;cursor:pointer;font-family:inherit}
.batch-toggle-btn:hover{background:#f5f5f0;color:#4338ca}
.batch-toggle-btn.active{background:#fef2f2;border-color:#fca5a5;color:#ef4444}
.batch-action-bar{display:none;padding:8px 14px;border-bottom:1px solid #e8e8e4;align-items:center;gap:8px;font-size:12px;color:#888;background:#fafaf8}
.batch-bar-btn{font-size:12px;padding:4px 10px;border:1px solid #e8e8e4;border-radius:6px;background:#fff;color:#555;cursor:pointer;font-family:inherit}
.batch-bar-btn:hover{background:#f5f5f0}
.batch-bar-btn.danger{border-color:#fca5a5;color:#ef4444}
.batch-bar-btn.danger:hover{background:#fef2f2}
.note-item.select-mode{display:flex;align-items:flex-start;gap:8px}
.note-item-content{flex:1;min-width:0}
.note-checkbox{margin-top:3px;cursor:pointer;width:14px;height:14px;flex-shrink:0}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sidebar-top">
      <div class="app-title">📚 我的知识库</div>
      <div class="search-box">
        <svg width="14" height="14" fill="none" stroke="#aaa" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" placeholder="搜索笔记..." id="searchInput">
      </div>
    </div>
    <div class="section-label">分类</div>
    <div class="cat-list" id="catList"></div>
    <button class="new-btn" id="newBtn">＋ 新建笔记</button>
  </div>
  <div class="note-list">
    <div class="list-header">
      <span id="listTitle">全部笔记</span>
      <span style="display:flex;align-items:center;gap:8px">
        <span id="listCount" style="font-size:12px;color:#bbb"></span>
        <button class="batch-toggle-btn" id="batchModeBtn" onclick="toggleSelectMode()">批量删除</button>
      </span>
    </div>
    <div class="batch-action-bar" id="batchActionBar">
      <span>已选 <span id="selectedCount">0</span> 项</span>
      <button class="batch-bar-btn" id="selectAllBtn" onclick="selectAllVisible()">全选</button>
      <button class="batch-bar-btn danger" onclick="deleteSelectedNotes()">删除所选</button>
      <button class="batch-bar-btn" onclick="toggleSelectMode()">取消</button>
    </div>
    <div class="note-items" id="noteItems"></div>
  </div>
  <div class="editor" id="editor">
    <div id="emptyState" class="empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
      选择笔记或新建一篇
    </div>
    <div id="editorContent" style="display:none;flex:1;flex-direction:column">
      <div class="toolbar">
        <button class="tb-btn" onclick="ins('**','**')"><b>B</b></button>
        <button class="tb-btn" onclick="ins('*','*')"><i>I</i></button>
        <button class="tb-btn" onclick="insLine('## ')">H2</button>
        <button class="tb-btn" onclick="insLine('### ')">H3</button>
        <button class="tb-btn" onclick="insLine('- ')">列表</button>
        <button class="tb-btn" onclick="insLine('> ')">引用</button>
        <button class="tb-btn" onclick="ins('\`','\`')">代码</button>
        <button class="tb-btn" onclick="insLine('---')">分割线</button>
        <label class="img-upload-btn" title="插入图片">
          🖼 图片
          <input type="file" id="imgUploadInput" accept="image/*" onchange="uploadImage(this)">
        </label>
        <span id="uploadProgress" class="upload-progress"></span>
        <span style="flex:1"></span>
        <!-- 新增下载按钮 -->
        <button class="download-btn" onclick="downloadPDF()" title="下载为PDF">⬇ 下载PDF</button>
        <button class="tb-btn" id="previewBtn" onclick="togglePreview()">👁 预览</button>
        <button class="tb-btn" id="splitBtn" onclick="toggleSplit()">⬛ 分屏</button>
        <select class="tb-select" id="catSelect">
          <option value="">选择分类</option>
          <option>有机化学</option>
          <option>无机化学</option>
          <option>分析化学</option>
          <option>物理化学</option>
          <option>编程</option>
          <option>数学</option>
          <option>英语</option>
          <option>读书笔记</option>
          <option>其他</option>
        </select>
      </div>
      <input class="editor-title" id="noteTitle" placeholder="笔记标题...">
      <div class="editor-tags" id="editorTags"></div>
      <div class="editor-area" id="editorArea">
        <div class="edit-pane" id="editPane">
          <textarea id="noteContent" placeholder="开始记录你的想法...\n\n支持 Markdown 格式：\n## 标题\n**粗体** *斜体*\n- 列表项\n> 引用\n\n图片：点击工具栏「🖼 图片」上传"></textarea>
        </div>
        <div class="preview-pane" id="previewPane"></div>
      </div>
      <div class="editor-footer">
        <span class="word-count" id="wordCount">0 字</span>
        <div class="footer-btns">
          <button class="del-btn" onclick="deleteNote()">删除</button>
          <button class="save-btn" id="saveBtn" onclick="saveNote()">保存</button>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://jcxxifymtgxcaxmggubi.supabase.co';
const SUPABASE_KEY = 'sb_publishable_K4BcxTkYldQ_0Pn2dtgRcQ_10_U9yEg';
const API = SUPABASE_URL + '/rest/v1/notes';
const STORAGE_API = SUPABASE_URL + '/storage/v1/object';
const HEADERS = {'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY};

let notes=[], currentId=null, currentCat='全部', viewMode='edit';
// ── 新增：批量删除相关状态 ──
let selectMode=false, selectedIds=new Set();

function toast(msg,dur){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),dur||2000)}

// ── 图片上传 ────────────────────────────────────────────
async function uploadImage(input){
  const file = input.files[0];
  if(!file) return;
  const prog = document.getElementById('uploadProgress');
  prog.textContent = '上传中...';

  const fileName = Date.now() + '_' + file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
  const bucket = 'note-images';

  try {
    const r = await fetch(STORAGE_API + '/' + bucket + '/' + fileName, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY,
        'Content-Type': file.type,
        'x-upsert': 'true'
      },
      body: file
    });

    if(r.ok){
      const publicUrl = SUPABASE_URL + '/storage/v1/object/public/' + bucket + '/' + fileName;
      insertImageMd(publicUrl, file.name);
      prog.textContent = '✓ 上传成功';
      setTimeout(()=>prog.textContent='', 2000);
    } else {
      await insertBase64(file);
      prog.textContent = '✓ 已嵌入（Base64）';
      setTimeout(()=>prog.textContent='', 2000);
    }
  } catch(e) {
    await insertBase64(file);
    prog.textContent = '✓ 已嵌入';
    setTimeout(()=>prog.textContent='', 2000);
  }
  input.value = '';
}

function insertImageMd(url, name){
  const ta = document.getElementById('noteContent');
  const md = '\n![' + (name||'图片') + '](' + url + ')\n';
  const s = ta.selectionStart;
  ta.value = ta.value.slice(0,s) + md + ta.value.slice(s);
  ta.selectionStart = ta.selectionEnd = s + md.length;
  ta.focus();
  updatePreview();
  resetSaveBtn();
}

function insertBase64(file){
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => {
      const md = '\n![' + file.name + '](' + e.target.result + ')\n';
      const ta = document.getElementById('noteContent');
      const s = ta.selectionStart;
      ta.value = ta.value.slice(0,s) + md + ta.value.slice(s);
      ta.selectionStart = ta.selectionEnd = s + md.length;
      ta.focus();
      updatePreview();
      resetSaveBtn();
      resolve();
    };
    reader.readAsDataURL(file);
  });
}

// ── 新增：下载PDF（打印方式，不弹窗直接下载）──────────────
async function downloadPDF(){
  const n = notes.find(x=>x.id===currentId);
  if(!n){toast('请先选择笔记');return;}
  const title = document.getElementById('noteTitle').value || '无标题';
  const htmlBody = mdToHtml(document.getElementById('noteContent').value);

  // 电脑端用 jsPDF 直接下载，手机端用打印
  const isMobile = /Android|iPhone|iPad/i.test(navigator.userAgent);
  if(isMobile){
    const win = window.open('','_blank');
    if(!win){toast('请允许弹出窗口');return;}
    win.document.write(buildPrintHtml(title, htmlBody));
    win.document.close();
    toast('请选择「存储为PDF」');
    return;
  }

  toast('正在生成PDF...');
  try{
    await loadScript('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js');
    await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js');

    const container = document.createElement('div');
    container.style.cssText = 'position:fixed;left:-9999px;top:0;width:794px;background:#fff;padding:48px 56px;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;font-size:14px;line-height:1.8;color:#1a1a1a;box-sizing:border-box;';
    container.innerHTML = `
      <div style="margin-bottom:20px">
        <div style="font-size:22px;font-weight:700;color:#1a1a1a;margin-bottom:6px">${escapeHtml(title)}</div>
        <div style="font-size:12px;color:#aaa">导出时间：${new Date().toLocaleString('zh-CN')}</div>
      </div>
      <hr style="border:none;border-top:1px solid #e8e8e4;margin-bottom:18px">
      <style>
        h1{font-size:20px;font-weight:700;margin:0 0 12px;padding-bottom:8px;border-bottom:2px solid #e8e8e4}
        h2{font-size:17px;font-weight:600;margin:18px 0 8px;padding-bottom:4px;border-bottom:1px solid #f0f0ec}
        h3{font-size:15px;font-weight:600;margin:14px 0 6px;color:#333}
        p{margin:0 0 9px;color:#333}ul,ol{margin:0 0 9px 20px}li{margin-bottom:3px}
        blockquote{border-left:3px solid #a5b4fc;padding:6px 12px;margin:10px 0;background:#f9f9ff;color:#555}
        code{background:#f0f0ec;padding:1px 4px;border-radius:3px;font-family:monospace;font-size:12px;color:#d63384}
        pre{background:#f5f5f0;padding:10px;border-radius:6px;margin:10px 0}
        table{width:100%;border-collapse:collapse;margin:10px 0;font-size:13px}
        th{background:#ede9fe;padding:6px 8px;font-weight:600;border:1px solid #e0defa}
        td{padding:5px 8px;border:1px solid #e8e8e4}tr:nth-child(even){background:#f9f9ff}
        strong{font-weight:600}em{font-style:italic;color:#555}
        hr{border:none;border-top:1px solid #e8e8e4;margin:14px 0}
        img{max-width:100%;border-radius:6px;margin:6px 0;display:block}
      </style>
      <div>${htmlBody}</div>`;
    document.body.appendChild(container);

    const canvas = await html2canvas(container,{scale:2,useCORS:true,backgroundColor:'#ffffff',logging:false});
    document.body.removeChild(container);

    const {jsPDF} = window.jspdf;
    const imgData = canvas.toDataURL('image/jpeg',0.92);
    const pageW = 210, pageH = 297;
    const imgW = pageW;
    const imgH = (canvas.height * imgW) / canvas.width;
    const pdf = new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});

    let yOffset = 0, remaining = imgH;
    while(remaining > 0){
      if(yOffset > 0) pdf.addPage();
      pdf.addImage(imgData,'JPEG',0,-yOffset,imgW,imgH,undefined,'FAST');
      yOffset += pageH;
      remaining -= pageH;
    }

    pdf.save((title+'.pdf').replace(/[\\/:*?"<>|]/g,'_'));
    toast('✓ 已下载 '+title+'.pdf');
  } catch(e){
    console.error(e);
    toast('PDF生成失败，请重试',3000);
  }
}

function loadScript(src){
  return new Promise((resolve,reject)=>{
    if(document.querySelector('script[src="'+src+'"]')){resolve();return;}
    const s=document.createElement('script');
    s.src=src;s.onload=resolve;s.onerror=reject;
    document.head.appendChild(s);
  });
}

// ── Markdown 渲染 ──────────────────────────────────────
function mdToHtml(md){
  let codeBlocks = [];
  md = md.replace(/```([\s\S]*?)```/g, function(m, c) {
    codeBlocks.push(c.trim());
    return 'CODEBLOCK' + (codeBlocks.length-1) + 'END';
  });

  let inlineCodes = [];
  md = md.replace(/`([^`]+)`/g, function(m, c) {
    inlineCodes.push(c);
    return 'INLINECODE' + (inlineCodes.length-1) + 'END';
  });

  let mathBlocks = [], mathInlines = [];
  md = md.replace(/\$\$([\s\S]+?)\$\$/g, function(m, f) {
    mathBlocks.push(f);
    return 'MATHBLOCK' + (mathBlocks.length-1) + 'END';
  });
  md = md.replace(/\$([^\$\n]+?)\$/g, function(m, f) {
    mathInlines.push(f);
    return 'MATHINLINE' + (mathInlines.length-1) + 'END';
  });

  let tableBlocks = [];
  md = md.replace(/((?:^\|.+\|\s*\n)+)/gm, function(match) {
    var lines = match.trim().split('\n').filter(l => l.trim());
    var result = '<table>';
    var headerDone = false;
    for (var i = 0; i < lines.length; i++) {
      var line = lines[i].trim();
      if (!line) continue;
      if (/^\|[\s\-:]+\|$/.test(line.replace(/[^|\-: ]/g,''))) {
        headerDone = true;
        continue;
      }
      var cells = line.split('|').slice(1,-1).map(c => c.trim());
      if (!headerDone) {
        result += '<thead><tr>' + cells.map(c=>'<th>'+c+'</th>').join('') + '</tr></thead><tbody>';
      } else {
        result += '<tr>' + cells.map(c=>'<td>'+c+'</td>').join('') + '</tr>';
      }
    }
    if (headerDone) result += '</tbody>';
    result += '</table>';
    tableBlocks.push(result);
    return 'TABLEBLOCK' + (tableBlocks.length-1) + 'END\n';
  });

  let h = md
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');

  h = h.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1" style="max-width:100%;border-radius:8px;margin:8px 0;display:block">');
  h = h.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" style="color:#4338ca">$1</a>');

  var lines = h.split('\n');
  var out = [];
  for (var i = 0; i < lines.length; i++) {
    var line = lines[i];
    if (/^#### /.test(line)) { out.push('<h4 style="font-size:13px;font-weight:600;margin:12px 0 4px;color:#555">' + line.slice(5) + '</h4>'); continue; }
    if (/^### /.test(line)) { out.push('<h3>' + line.slice(4) + '</h3>'); continue; }
    if (/^## /.test(line)) { out.push('<h2>' + line.slice(3) + '</h2>'); continue; }
    if (/^# /.test(line)) { out.push('<h1>' + line.slice(2) + '</h1>'); continue; }
    if (/^---+$/.test(line.trim())) { out.push('<hr>'); continue; }
    if (/^&gt; /.test(line)) { out.push('<blockquote>' + line.slice(5) + '</blockquote>'); continue; }
    if (/^\d+\. /.test(line)) { out.push('<li>' + line.replace(/^\d+\. /,'') + '</li>'); continue; }
    if (/^[-*] /.test(line)) { out.push('<li>' + line.slice(2) + '</li>'); continue; }
    if (line.trim() === '') { out.push('<br>'); continue; }
    out.push('<p>' + line + '</p>');
  }

  h = out.join('\n');
  h = h.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  h = h.replace(/\*([^*\n]+?)\*/g, '<em>$1</em>');
  h = h.replace(/((?:<li>[\s\S]*?<\/li>\n?)+)/g, '<ul>$1</ul>');

  h = h.replace(/CODEBLOCK(\d+)END/g, function(m, i) {
    return '<pre><code>' + codeBlocks[i].replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>') + '</code></pre>';
  });
  h = h.replace(/INLINECODE(\d+)END/g, function(m, i) {
    return '<code>' + inlineCodes[i] + '</code>';
  });
  h = h.replace(/TABLEBLOCK(\d+)END/g, function(m, i) {
    return tableBlocks[i];
  });
  h = h.replace(/MATHBLOCK(\d+)END/g, function(m, i) {
    try { return '<div class="math-block">' + katex.renderToString(mathBlocks[i], {displayMode:true, throwOnError:false}) + '</div>'; }
    catch(e) { return '<div class="math-block">$$' + mathBlocks[i] + '$$</div>'; }
  });
  h = h.replace(/MATHINLINE(\d+)END/g, function(m, i) {
    try { return katex.renderToString(mathInlines[i], {displayMode:false, throwOnError:false}); }
    catch(e) { return '$' + mathInlines[i] + '$'; }
  });
  return h;
}

// ══════════════════════════════════════════════════════════
// 化学式文字 → SMILES 转换器 + 结构渲染
// 支持：C₆H₅CH₂CH₂COCH₃ 等有机化学式文字自动识别
// ══════════════════════════════════════════════════════════

// ── 下标数字还原（₀₁₂₃₄₅₆₇₈₉ → 0123456789）
function normSub(s){
  return s.replace(/[₀₁₂₃₄₅₆₇₈₉]/g,function(c){
    return '0123456789'['₀₁₂₃₄₅₆₇₈₉'.indexOf(c)];
  });
}

// ── 化学式文字 → SMILES 转换核心函数
function formulaToSmiles(raw){
  // 先还原下标
  var s = normSub(raw.trim());

  // ── 常见结构片段直接映射表（优先匹配，从长到短）
  var FRAGMENTS = [
    // 苯环相关
    [/C6H5/g,        'c1ccccc1'],
    [/Ph(?=[^a]|$)/g,'c1ccccc1'],
    // 羟基
    [/OH/g,          'O'],
    // 羰基类
    [/CHO/g,         'C=O'],       // 醛基
    [/COOH/g,        'C(=O)O'],    // 羧基
    [/COOR/g,        'C(=O)OCC'], // 酯（通用R=乙基）
    [/COCl/g,        'C(=O)Cl'],   // 酰氯
    [/CONH2/g,       'C(=O)N'],    // 酰胺
    [/CO/g,          'C=O'],       // 酮/羰基（放在COOH后面）
    // 卤素
    [/Br/g,          'Br'],
    [/Cl/g,          'Cl'],
    [/\bF\b/g,       'F'],
    [/\bI\b/g,       'I'],
    // 常见基团
    [/CH3/g,         'C'],
    [/CH2/g,         'C'],
    [/CH(?=[^0-9O]|$)/g, 'C'],
    [/C(?=[^a-zA-Z0-9(]|$)/g, 'C'],
    // 不饱和键
    [/=CH2/g,        '=C'],
    [/=CH/g,         '=C'],
    [/≡/g,           '#'],
    [/=/g,           '='],
    // 氨基
    [/NH2/g,         'N'],
    [/NH/g,          'N'],
    [/\bN\b/g,       'N'],
    // 数字（去掉，已合并到片段中）
    [/[0-9]+/g,      ''],
    // 括号保留
    // 去掉其余字母
    [/[HRSZ]/g,      ''],
  ];

  // ── 常见完整有机物直接映射（优先级最高）
  var KNOWN = {
    // 苯及苯基衍生物
    'C6H6':           'c1ccccc1',
    'C6H5CH3':        'Cc1ccccc1',
    'C6H5OH':         'Oc1ccccc1',
    'C6H5CHO':        'O=Cc1ccccc1',
    'C6H5COOH':       'OC(=O)c1ccccc1',
    'C6H5NH2':        'Nc1ccccc1',
    'C6H5Cl':         'Clc1ccccc1',
    'C6H5Br':         'Brc1ccccc1',
    'C6H5NO2':        'O=[N+]([O-])c1ccccc1',
    'C6H5CH2Cl':      'ClCc1ccccc1',
    'C6H5CH2Br':      'BrCc1ccccc1',
    'C6H5CH2OH':      'OCc1ccccc1',
    'C6H5CH=CH2':     'C=Cc1ccccc1',
    'C6H5CH2CH3':     'CCc1ccccc1',
    'C6H5CH2COOH':    'OC(=O)Cc1ccccc1',
    'C6H5COCH3':      'CC(=O)c1ccccc1',
    'C6H5COCl':       'ClC(=O)c1ccccc1',
    'C6H5CH2CH2COOH': 'OC(=O)CCc1ccccc1',
    'C6H5CH2CH2Br':   'BrCCc1ccccc1',
    'C6H5CH2CH2COCH3':'CC(=O)CCc1ccccc1',
    'C6H5CH=CHCOOH':  'OC(=O)/C=C/c1ccccc1',
    'C6H5CH=CHCHO':   'O=C/C=C/c1ccccc1',
    '(C6H5)2CO':      'O=C(c1ccccc1)c1ccccc1',
    '(C6H5)3COH':     'OC(c1ccccc1)(c1ccccc1)c1ccccc1',
    // 脂肪族
    'CH4':            'C',
    'C2H6':           'CC',
    'C3H8':           'CCC',
    'CH3OH':          'CO',
    'C2H5OH':         'CCO',
    'CH3CHO':         'CC=O',
    'CH3COCH3':       'CC(=O)C',
    'CH3COOH':        'CC(=O)O',
    'CH3COCl':        'CC(=O)Cl',
    'CH3COONa':       'CC(=O)[O-].[Na+]',
    'CH3COOC2H5':     'CCOC(=O)C',
    'CH3CONH2':       'CC(=O)N',
    '(CH3CO)2O':      'CC(=O)OC(=O)C',
    'HCHO':           'C=O',
    'HCOOH':          'OC=O',
    'C2H4':           'C=C',
    'C2H2':           'C#C',
    'CH3CH2CHO':      'CCC=O',
    'CH3CH2COOH':     'CCC(=O)O',
    'CH3CH2CH2COOH':  'CCCC(=O)O',
    'CH3CH2COCl':     'CCC(=O)Cl',
    'CH3COCH2COOC2H5':'CCOC(=O)CC(=O)C',   // 乙酰乙酸乙酯
    'CH2(COOC2H5)2':  'CCOC(=O)CC(=O)OCC', // 丙二酸二乙酯
    // 环状化合物
    'C6H12':          'C1CCCCC1',
    'C6H10O':         'O=C1CCCCC1',   // 环己酮
    'C5H10O':         'O=C1CCCC1',    // 环戊酮
    // 无机
    'H2O':            'O',
    'CO2':            'O=C=O',
    'HCl':            'Cl',
    'HBr':            'Br',
    'NH3':            'N',
    'NaOH':           '[Na+].[OH-]',
  };

  // 查已知表
  var cleaned = s.replace(/\s/g,'');
  if(KNOWN[cleaned]) return KNOWN[cleaned];

  // 尝试用片段转换（简化，不能处理所有情况）
  var result = cleaned;
  // 先处理苯基
  result = result.replace(/C6H5/g, 'Ph');
  // 处理常见结构
  result = result.replace(/COOH/g, 'C(=O)O');
  result = result.replace(/CHO/g,  'C=O');
  result = result.replace(/COCl/g, 'C(=O)Cl');
  result = result.replace(/CONH2/g,'C(=O)N');
  result = result.replace(/COOR/g, 'C(=O)OCC');
  result = result.replace(/CO/g,   'C(=O)');
  result = result.replace(/CH2/g,  'C');
  result = result.replace(/CH3/g,  'C');
  result = result.replace(/CH/g,   'C');
  result = result.replace(/OH/g,   'O');
  result = result.replace(/NH2/g,  'N');
  result = result.replace(/Br/g,   'Br');
  result = result.replace(/Cl/g,   'Cl');
  result = result.replace(/Ph/g,   'c1ccccc1');
  result = result.replace(/[0-9]+/g,'');
  result = result.replace(/[HhRrZzSs]/g,'');
  return result || null;
}

// ── 从预览HTML文本中识别化学式并插入结构图
function renderChemStructures(){
  if(typeof SmilesDrawer === 'undefined') return;
  var pane = document.getElementById('previewPane');

  // 方式1：```smiles ... ``` 代码块
  pane.querySelectorAll('pre code.language-smiles, code.language-smiles').forEach(function(el){
    drawSmiles(el.textContent.trim(), el.closest('pre')||el, 300, 200, false);
  });

  // 方式2：`@SMILES` 行内语法（以@开头）
  pane.querySelectorAll('code').forEach(function(el){
    var txt = el.textContent.trim();
    if(txt.startsWith('@') && !el.closest('.chem-block')){
      drawSmiles(txt.slice(1), el, 200, 140, true);
    }
  });

  // 方式3：自动识别段落/列表中独立出现的化学式文字
  // 匹配如：C₆H₅CH₂CH₂COCH₃ 或 CH₃COOH 等（含大写字母数字下标，长度≥4）
  var CHEM_PATTERN = /(?<![a-zA-Z])([A-Z][A-Za-z0-9₀₁₂₃₄₅₆₇₈₉\(\)=≡\+\-]{3,})(?![a-zA-Z])/g;

  // 只扫描 <p> <li> <td> <th> 里的文字节点
  var containers = pane.querySelectorAll('p, li, td, th');
  containers.forEach(function(container){
    if(container.closest('.chem-block')) return;
    var walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT, null, false);
    var textNodes = [];
    var node;
    while(node = walker.nextNode()){
      // 只处理含化学式特征的文字节点
      if(CHEM_PATTERN.test(node.textContent)){
        textNodes.push(node);
      }
    }
    textNodes.forEach(function(tn){
      CHEM_PATTERN.lastIndex = 0;
      var text = tn.textContent;
      var match;
      var fragments = [];
      var lastIndex = 0;
      while((match = CHEM_PATTERN.exec(text)) !== null){
        var formula = match[1];
        // 跳过纯英文单词（如"and"、"the"）和太短的
        if(/^[a-z]+$/.test(formula)) continue;
        // 跳过已知非化学式词（HTML标签残留等）
        if(formula.length < 4) continue;
        // 转为SMILES
        var smiles = formulaToSmiles(formula);
        if(!smiles || smiles.length < 2) continue;
        // 验证SMILES是否能解析
        fragments.push({start: match.index, end: match.index+formula.length, formula: formula, smiles: smiles});
      }
      if(fragments.length === 0) return;

      // 替换文字节点为混合节点（文字+结构图）
      var parent = tn.parentNode;
      var frag = document.createDocumentFragment();
      var prev = 0;
      fragments.forEach(function(f){
        // 之前的普通文字
        if(f.start > prev){
          frag.appendChild(document.createTextNode(text.slice(prev, f.start)));
        }
        // 化学结构容器
        var wrap = document.createElement('span');
        wrap.className = 'chem-inline-wrap';
        wrap.title = f.formula;
        // canvas
        var canvas = document.createElement('canvas');
        canvas.width = 200; canvas.height = 130;
        wrap.appendChild(canvas);
        // 原式文字（小字，hover显示）
        var label = document.createElement('span');
        label.className = 'chem-label';
        label.textContent = f.formula;
        wrap.appendChild(label);
        frag.appendChild(wrap);
        // 异步渲染
        (function(cv, sm, fw){
          try{
            var drawer = new SmilesDrawer.SvgDrawer({width:200,height:130,
              themes:{light:{C:'#1a1a1a',O:'#dc2626',N:'#4f46e5',S:'#d97706',
                F:'#059669',Cl:'#059669',Br:'#7c3aed',I:'#7c3aed',H:'#888',background:'#f9f9ff'}}});
            SmilesDrawer.parse(sm, function(tree){
              drawer.draw(tree, cv, 'light');
            }, function(){
              // 解析失败：只显示原式文字
              cv.style.display='none';
            });
          }catch(e){ cv.style.display='none'; }
        })(canvas, f.smiles, f.formula);

        prev = f.end;
      });
      if(prev < text.length){
        frag.appendChild(document.createTextNode(text.slice(prev)));
      }
      parent.replaceChild(frag, tn);
    });
  });
}

// ── 渲染单个SMILES到DOM元素
function drawSmiles(smiles, targetEl, w, h, inline){
  var wrapper = document.createElement(inline ? 'span' : 'div');
  wrapper.className = 'chem-block';
  if(inline){ wrapper.style.display='inline-block'; wrapper.style.verticalAlign='middle'; }
  var canvas = document.createElement('canvas');
  canvas.width = w; canvas.height = h;
  wrapper.appendChild(canvas);
  targetEl.replaceWith ? targetEl.replaceWith(wrapper) : targetEl.parentNode.replaceChild(wrapper, targetEl);
  try{
    var drawer = new SmilesDrawer.SvgDrawer({width:w, height:h,
      themes:{light:{C:'#1a1a1a',O:'#dc2626',N:'#4f46e5',S:'#d97706',
        F:'#059669',Cl:'#059669',Br:'#7c3aed',I:'#7c3aed',H:'#888',background:'#f9f9ff'}}});
    SmilesDrawer.parse(smiles, function(tree){
      drawer.draw(tree, canvas, 'light');
    }, function(){
      wrapper.innerHTML='<span class="chem-error">无法渲染: '+escapeHtml(smiles)+'</span>';
    });
  }catch(e){
    wrapper.innerHTML='<span class="chem-error">错误: '+escapeHtml(smiles)+'</span>';
  }
}

function toggleSplit(){
  const area = document.getElementById('editorArea');
  const pp = document.getElementById('previewPane');
  const ep = document.getElementById('editPane');
  const btn = document.getElementById('splitBtn');
  const pb = document.getElementById('previewBtn');
  if(viewMode === 'split'){
    viewMode = 'edit';
    area.classList.remove('split-view');
    area.style.display='flex'; area.style.flexDirection='column';
    ep.style.display='block'; ep.style.flex='1';
    pp.classList.remove('show'); pp.style.display='none';
    btn.classList.remove('active'); btn.textContent='⬛ 分屏';
    pb.style.display='';
  } else {
    viewMode = 'split';
    updatePreview();
    area.classList.add('split-view');
    area.style.display='flex'; area.style.flexDirection='row';
    ep.style.display='block'; ep.style.flex='1';
    pp.classList.add('show'); pp.style.display='block'; pp.style.flex='1';
    btn.classList.add('active'); btn.textContent='⬛ 退出分屏';
    pb.style.display='none';
  }
}

// ── 数据操作 ────────────────────────────────────────────
async function fetchNotes(){
  document.getElementById('noteItems').innerHTML='<div class="loading">加载中...</div>';
  const r=await fetch(API+'?order=updated_at.desc',{headers:{...HEADERS,'Prefer':'return=representation'}});
  notes=await r.json();
  if(!Array.isArray(notes)) notes=[];
  renderAll();
}

const CAT_ICONS = {
  '全部':'📋','有机化学':'⚗️','无机化学':'🧪','分析化学':'🔬',
  '物理化学':'⚡','编程':'💻','数学':'📐','英语':'🌐',
  '读书笔记':'📖','其他':'📁'
};

function cats(){
  const c=['全部'];
  notes.forEach(n=>{if(n.category&&!c.includes(n.category))c.push(n.category)});
  return c;
}
function catCount(c){return c==='全部'?notes.length:notes.filter(n=>n.category===c).length}
function catIcon(c){return CAT_ICONS[c]||'📁'}

function renderAll(){renderCats();renderList()}

function renderCats(){
  document.getElementById('catList').innerHTML=cats().map(c=>`
    <div class="cat-item${c===currentCat?' active':''}">
      <div class="cat-item-left" onclick="selectCat('${c.replace(/'/g, "\\'")}')">
        ${catIcon(c)} <span>${c}</span>
        <span class="cat-count">${catCount(c)}</span>
      </div>
      ${c !== '全部' ? `<button class="cat-delete-btn" onclick="deleteCategory('${c.replace(/'/g, "\\'")}')" title="删除分类「${c}」及其中所有笔记">🗑</button>` : ''}
    </div>`).join('');
}

window.deleteCategory = async function(categoryName) {
  if(categoryName === '全部') {
    toast('不能删除「全部」虚拟分类', 1500);
    return;
  }
  const notesToDelete = notes.filter(n => n.category === categoryName);
  const count = notesToDelete.length;
  const confirmMsg = `⚠️ 确定要删除分类「${categoryName}」吗？\n该分类下的 ${count} 条笔记将被永久删除！\n此操作不可恢复。`;
  if(!confirm(confirmMsg)) return;
  toast(`正在删除分类「${categoryName}」及 ${count} 条笔记...`, 1800);
  try {
    const deleteUrl = API + '?category=eq.' + encodeURIComponent(categoryName);
    const res = await fetch(deleteUrl, {method: 'DELETE', headers: HEADERS});
    if(res.ok) {
      notes = notes.filter(n => n.category !== categoryName);
      if(currentId) {
        const currentNote = notes.find(n => n.id === currentId);
        if(!currentNote) {
          currentId = null;
          document.getElementById('emptyState').style.display = '';
          document.getElementById('editorContent').style.display = 'none';
        }
      }
      if(currentCat === categoryName) currentCat = '全部';
      renderAll();
      toast(`✅ 已删除分类「${categoryName}」及 ${count} 条笔记`, 2500);
    } else {
      toast(`删除失败: 服务器错误`, 2000);
    }
  } catch(err) {
    toast(`删除出错: ${err.message}`, 2000);
  }
};

function selectCat(c){currentCat=c;document.getElementById('listTitle').textContent=c;renderCats();renderList()}

function filtered(){return currentCat==='全部'?notes:notes.filter(n=>n.category===currentCat)}

function renderList(){
  const q=document.getElementById('searchInput').value.trim().toLowerCase();
  let list=filtered();
  if(q)list=list.filter(n=>(n.title||'').toLowerCase().includes(q)||(n.content||'').toLowerCase().includes(q)||((n.tags||[]).join(' ')).toLowerCase().includes(q));
  document.getElementById('listCount').textContent=list.length+'篇';
  document.getElementById('noteItems').innerHTML=list.length?list.map(n=>`
    <div class="note-item${n.id===currentId?' active':''}${selectMode?' select-mode':''}" onclick="${selectMode?`toggleNoteSelect('${n.id}')`:`openNote('${n.id}')`}">
      ${selectMode?`<input type="checkbox" class="note-checkbox" ${selectedIds.has(n.id)?'checked':''} onclick="event.stopPropagation();toggleNoteSelect('${n.id}')">`:''}
      <div class="note-item-content">
        <div class="note-title">${escapeHtml(n.title||'无标题')}</div>
        <div class="note-preview">${escapeHtml((n.content||'').replace(/!\[.*?\]\(data:.*?\)/g,'[图片]').replace(/[#\->\`*!]/g,'').slice(0,50))}</div>
        <div class="note-meta">
          ${(n.tags||[]).slice(0,3).map(t=>`<span class="tag">${escapeHtml(t)}</span>`).join('')}
          <span class="note-date">${(n.updated_at||'').slice(0,10)}</span>
        </div>
      </div>
    </div>`).join(''):'<div class="loading">暂无笔记</div>';
  updateBatchBar();
}

// ── 新增：批量删除笔记 ──────────────────────────────────
function getVisibleNotes(){
  const q=document.getElementById('searchInput').value.trim().toLowerCase();
  let list=filtered();
  if(q)list=list.filter(n=>(n.title||'').toLowerCase().includes(q)||(n.content||'').toLowerCase().includes(q)||((n.tags||[]).join(' ')).toLowerCase().includes(q));
  return list;
}

function toggleSelectMode(){
  selectMode=!selectMode;
  selectedIds.clear();
  const btn=document.getElementById('batchModeBtn');
  const bar=document.getElementById('batchActionBar');
  if(selectMode){
    btn.textContent='取消';btn.classList.add('active');
    bar.style.display='flex';
  } else {
    btn.textContent='批量删除';btn.classList.remove('active');
    bar.style.display='none';
  }
  renderList();
}

function toggleNoteSelect(id){
  if(selectedIds.has(id))selectedIds.delete(id);else selectedIds.add(id);
  renderList();
}

function selectAllVisible(){
  const list=getVisibleNotes();
  const allSelected=list.length>0&&list.every(n=>selectedIds.has(n.id));
  if(allSelected){list.forEach(n=>selectedIds.delete(n.id));}
  else{list.forEach(n=>selectedIds.add(n.id));}
  renderList();
}

function updateBatchBar(){
  const cntEl=document.getElementById('selectedCount');
  if(!cntEl)return;
  cntEl.textContent=selectedIds.size;
  const allBtn=document.getElementById('selectAllBtn');
  const list=getVisibleNotes();
  const allSelected=list.length>0&&list.every(n=>selectedIds.has(n.id));
  if(allBtn)allBtn.textContent=allSelected?'取消全选':'全选';
}

async function deleteSelectedNotes(){
  if(selectedIds.size===0){toast('请先选择要删除的笔记');return;}
  const count=selectedIds.size;
  if(!confirm(`确定删除选中的 ${count} 篇笔记？此操作不可恢复。`))return;
  const ids=Array.from(selectedIds);
  const savedIds=ids.filter(id=>{const n=notes.find(x=>x.id===id);return n&&n._saved;});
  const unsavedIds=ids.filter(id=>!savedIds.includes(id));
  const actuallyDeleted=new Set(unsavedIds); // 还没存进数据库的草稿，直接算删除成功
  try{
    if(savedIds.length){
      const r=await fetch(API+'?id=in.('+savedIds.join(',')+')',{method:'DELETE',headers:{...HEADERS,'Prefer':'return=representation'}});
      if(!r.ok)throw new Error(await r.text());
      const result=await r.json();
      (result||[]).forEach(row=>actuallyDeleted.add(row.id));
    }
    notes=notes.filter(n=>!actuallyDeleted.has(n.id));
    if(currentId&&actuallyDeleted.has(currentId)){
      currentId=null;
      document.getElementById('emptyState').style.display='';
      document.getElementById('editorContent').style.display='none';
    }
    selectMode=false;selectedIds.clear();
    document.getElementById('batchModeBtn').textContent='批量删除';
    document.getElementById('batchModeBtn').classList.remove('active');
    document.getElementById('batchActionBar').style.display='none';
    if(actuallyDeleted.size<count){
      toast(`只成功删除了 ${actuallyDeleted.size}/${count} 篇，数据库可能没开启 DELETE 权限(RLS)，请检查`,4500);
    } else {
      toast(`已删除 ${count} 篇笔记`);
    }
    renderAll();
  }catch(e){
    console.error('批量删除失败:',e);
    toast('批量删除失败: '+e.message,3000);
  }
}

function escapeHtml(str){
  if(!str) return '';
  return str.replace(/[&<>"']/g, function(m){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m];
  });
}

function openNote(id){
  currentId=id;
  const n=notes.find(x=>x.id===id);
  if(!n)return;
  document.getElementById('emptyState').style.display='none';
  const ec=document.getElementById('editorContent');
  ec.style.display='flex'; ec.style.flexDirection='column';
  document.getElementById('noteTitle').value=n.title||'';
  document.getElementById('noteContent').value=n.content||'';
  document.getElementById('catSelect').value=n.category||'';
  renderEditorTags(n.tags||[]);
  updateCount();
  resetSaveBtn();
  if(viewMode==='preview'||viewMode==='split') updatePreview();
  renderList();
}

function renderEditorTags(tags){
  document.getElementById('editorTags').innerHTML=
    tags.map(t=>`<span class="etag">${escapeHtml(t)}<span class="etag-rm" onclick="removeTag('${t.replace(/'/g, "\\'")}')">×</span></span>`).join('')+
    `<input class="tag-input" placeholder="+ 添加标签" id="tagInput" onkeydown="addTag(event)">`;
}

function removeTag(t){const n=notes.find(x=>x.id===currentId);if(!n)return;n.tags=(n.tags||[]).filter(x=>x!==t);renderEditorTags(n.tags)}
function addTag(e){
  if(e.key!=='Enter')return;
  const v=e.target.value.trim();if(!v)return;
  const n=notes.find(x=>x.id===currentId);
  if(n){n.tags=n.tags||[];if(!n.tags.includes(v))n.tags.push(v);renderEditorTags(n.tags)}
  e.target.value='';
}

function updateCount(){document.getElementById('wordCount').textContent=(document.getElementById('noteContent').value||'').length+' 字'}
function resetSaveBtn(){const b=document.getElementById('saveBtn');b.textContent='保存';b.className='save-btn';b.disabled=false;}

document.getElementById('noteTitle').oninput=resetSaveBtn;
document.getElementById('noteContent').oninput=()=>{
  updateCount();resetSaveBtn();
  if(viewMode==='preview'||viewMode==='split') updatePreview();
};

// ── 保存笔记（修复新建逻辑）──────────────────────────────
async function saveNote(){
  const n=notes.find(x=>x.id===currentId);
  if(!n)return;
  n.title=document.getElementById('noteTitle').value||'无标题';
  n.content=document.getElementById('noteContent').value;
  n.category=document.getElementById('catSelect').value;
  n.updated_at=new Date().toISOString();

  const b=document.getElementById('saveBtn');
  b.textContent='保存中...';b.disabled=true;

  try{
    if(!n._saved){
      // 新建：POST，不带本地临时id
      const body={title:n.title,content:n.content,category:n.category,tags:n.tags,updated_at:n.updated_at};
      const r=await fetch(API,{method:'POST',headers:{...HEADERS,'Prefer':'return=representation'},body:JSON.stringify(body)});
      if(!r.ok) throw new Error(await r.text());
      const result=await r.json();
      if(Array.isArray(result)&&result[0]){
        const oldId=n.id;
        n.id=result[0].id;
        n.updated_at=result[0].updated_at||n.updated_at;
        if(currentId===oldId) currentId=n.id;
      }
      n._saved=true;
    } else {
      // 更新：PATCH
      const body={title:n.title,content:n.content,category:n.category,tags:n.tags,updated_at:n.updated_at};
      const r=await fetch(API+'?id=eq.'+n.id,{method:'PATCH',headers:{...HEADERS,'Prefer':'return=representation'},body:JSON.stringify(body)});
      if(!r.ok) throw new Error(await r.text());
    }
    b.textContent='✓ 已保存';b.className='save-btn saved';b.disabled=false;
    toast('保存成功');renderAll();
  } catch(e){
    console.error('保存失败:',e);
    b.textContent='保存';b.className='save-btn';b.disabled=false;
    toast('保存失败: '+e.message,3000);
  }
}

async function deleteNote(){
  if(!currentId)return;
  if(!confirm('确定删除这条笔记？'))return;
  const n=notes.find(x=>x.id===currentId);
  if(n&&n._saved){
    try{
      const r=await fetch(API+'?id=eq.'+currentId,{method:'DELETE',headers:{...HEADERS,'Prefer':'return=representation'}});
      if(!r.ok) throw new Error(await r.text());
      const result=await r.json();
      if(!Array.isArray(result)||result.length===0){
        toast('删除失败：数据库没有实际删除这条记录，很可能是 Supabase 表的 RLS 没有开启 DELETE 权限，请检查',4500);
        return;
      }
    }catch(e){
      console.error('删除失败:',e);
      toast('删除失败: '+e.message,3000);
      return;
    }
  }
  notes=notes.filter(x=>x.id!==currentId);currentId=null;
  document.getElementById('emptyState').style.display='';
  document.getElementById('editorContent').style.display='none';
  toast('已删除');renderAll();
}

document.getElementById('newBtn').onclick=()=>{
  const n={id:'tmp-'+Date.now(),title:'',content:'',
    category:currentCat==='全部'?'其他':currentCat,
    tags:[],updated_at:new Date().toISOString(),_saved:false};
  notes.unshift(n);renderList();openNote(n.id);
  setTimeout(()=>document.getElementById('noteTitle').focus(),50);
};

document.getElementById('searchInput').oninput=renderList;

function ins(pre,suf){
  const ta=document.getElementById('noteContent');
  const s=ta.selectionStart,e=ta.selectionEnd;
  const sel=ta.value.slice(s,e);
  ta.value=ta.value.slice(0,s)+pre+sel+suf+ta.value.slice(e);
  ta.selectionStart=s+pre.length;ta.selectionEnd=s+pre.length+sel.length;
  ta.focus();if(viewMode==='split'||viewMode==='preview')updatePreview();
}
function insLine(pre){
  const ta=document.getElementById('noteContent');
  const s=ta.selectionStart;
  const start=ta.value.lastIndexOf('\n',s-1)+1;
  ta.value=ta.value.slice(0,start)+pre+ta.value.slice(start);
  ta.selectionStart=ta.selectionEnd=s+pre.length;
  ta.focus();if(viewMode==='split'||viewMode==='preview')updatePreview();
}

fetchNotes();
</script>
