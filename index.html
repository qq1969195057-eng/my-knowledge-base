### 1. 表面张力基本性质
- 存在于任何两相界面，方向与界面相切，指向使**表面积缩小**的一侧
- 温度升高 → 表面张力减小；临界温度时趋近于**零**
- 加入溶质 → 表面张力发生变化（取决于溶质本性和用量）

### 2. 拉普拉斯方程（弯曲液面附加压力）
凸液面：p' = p₀ + pₛ；凹液面：p' = p₀ - pₛ
附加压力 **pₛ = 2σ/R**，方向**总指向曲率中心**

### 3. 最大泡压法原理
气泡形成：平面(R最大) → 曲率缩小 → **半球形(R=r，压力最大)** → 气泡逸出

公式：**Δp最大 = 2σ/r，σ = K·Δh最大**

仪器常数：**K = σ水 / Δh最大,水**（用纯水标定）

### 4. 吉布斯吸附等温式
**Γ = -(C/RT)(dσ/dC)T**
- Γ > 0：正吸附，表面张力降低（**表面活性物质**，如正丁醇）
- Γ < 0：负吸附，表面张力升高（非表面活性物质）

### 5. 朗格谬尔公式求饱和吸附量
C/Γ = C/Γ∞ + 1/(k·Γ∞)

以 **C/Γ 对 C 作图**，斜率 = 1/Γ∞

分子截面积：**S₀ = 1/(Γ∞·Nₐ)**

  const fileName = Date.now() + '_' + file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
  const bucket = 'note-images';
  try {
    const r = await fetch(STORAGE_API + '/' + bucket + '/' + fileName, {
      method: 'POST',
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': file.type, 'x-upsert': 'true' },
      body: file
    });
    if (r.ok) {
      insertImageMd(SUPABASE_URL + '/storage/v1/object/public/' + bucket + '/' + fileName, file.name);
      prog.textContent = '✓ 上传成功';
    } else {
      await insertBase64(file);
      prog.textContent = '✓ 已嵌入';
    }
  } catch (e) {
    await insertBase64(file);
    prog.textContent = '✓ 已嵌入';
  }
  setTimeout(() => prog.textContent = '', 2000);
  input.value = '';
}

function insertImageMd(url, name) {
  const ta = document.getElementById('noteContent');
  const md = '\n![' + (name || '图片') + '](' + url + ')\n';
  const s = ta.selectionStart;
  ta.value = ta.value.slice(0, s) + md + ta.value.slice(s);
  ta.selectionStart = ta.selectionEnd = s + md.length;
  ta.focus(); updatePreview(); resetSaveBtn();
}

function insertBase64(file) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => {
      const md = '\n![' + file.name + '](' + e.target.result + ')\n';
      const ta = document.getElementById('noteContent');
      const s = ta.selectionStart;
      ta.value = ta.value.slice(0, s) + md + ta.value.slice(s);
      ta.selectionStart = ta.selectionEnd = s + md.length;
      ta.focus(); updatePreview(); resetSaveBtn(); resolve();
    };
    reader.readAsDataURL(file);
  });
}

// ── Markdown 渲染 ─────────────────────────────────────────
function mdToHtml(md) {
  let h = md
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/```([\s\S]*?)```/g, (m, c) => '<pre><code>' + c.trim() + '</code></pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/^---+$/gm, '<hr>')
    .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
    .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
    .replace(/^[-*] (.+)$/gm, '<li>$1</li>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>');
  h = h.replace(/((?:<li>.*?<\/li>\s*)+)/g, '<ul>$1</ul>');
  return '<p>' + h + '</p>';
}

function updatePreview() {
  document.getElementById('previewPane').innerHTML = mdToHtml(document.getElementById('noteContent').value);
}

function togglePreview() {
  const pp = document.getElementById('previewPane'), ep = document.getElementById('editPane');
  const btn = document.getElementById('previewBtn'), sb = document.getElementById('splitBtn');
  if (viewMode === 'preview') {
    viewMode = 'edit';
    pp.classList.remove('show'); pp.style.display = 'none';
    ep.style.display = 'block';
    btn.classList.remove('active'); btn.textContent = '👁 预览';
    document.getElementById('editorArea').classList.remove('split-view');
    sb.style.display = '';
  } else {
    viewMode = 'preview'; updatePreview();
    ep.style.display = 'none';
    pp.classList.add('show'); pp.style.display = 'block';
    btn.classList.add('active'); btn.textContent = '✏ 编辑';
    document.getElementById('editorArea').classList.remove('split-view');
    sb.style.display = 'none';
  }
}

function toggleSplit() {
  const area = document.getElementById('editorArea');
  const pp = document.getElementById('previewPane'), ep = document.getElementById('editPane');
  const btn = document.getElementById('splitBtn'), pb = document.getElementById('previewBtn');
  if (viewMode === 'split') {
    viewMode = 'edit';
    area.classList.remove('split-view');
    area.style.display = 'flex'; area.style.flexDirection = 'column';
    ep.style.display = 'block'; ep.style.flex = '1';
    pp.classList.remove('show'); pp.style.display = 'none';
    btn.classList.remove('active'); btn.textContent = '⬛ 分屏'; pb.style.display = '';
  } else {
    viewMode = 'split'; updatePreview();
    area.classList.add('split-view');
    area.style.display = 'flex'; area.style.flexDirection = 'row';
    ep.style.display = 'block'; ep.style.flex = '1';
    pp.classList.add('show'); pp.style.display = 'block'; pp.style.flex = '1';
    btn.classList.add('active'); btn.textContent = '⬛ 退出分屏'; pb.style.display = 'none';
  }
}

// ── 数据操作 ─────────────────────────────────────────────
async function fetchNotes() {
  document.getElementById('noteItems').innerHTML = '<div class="loading">加载中...</div>';
  const r = await fetch(API + '?order=updated_at.desc', { headers: { ...HEADERS, 'Prefer': 'return=representation' } });
  notes = await r.json();
  if (!Array.isArray(notes)) notes = [];
  renderAll();
}

const CAT_ICONS = {
  '全部': '📋', '物理化学实验': '🧪', '有机化学': '⚗️', '无机化学': '🔭',
  '分析化学': '🔬', '物理化学': '⚡', '编程': '💻', '数学': '📐',
  '英语': '🌐', '读书笔记': '📖', '其他': '📁'
};

function cats() {
  const c = ['全部'];
  notes.forEach(n => { if (n.category && !c.includes(n.category)) c.push(n.category); });
  return c;
}
function catCount(c) { return c === '全部' ? notes.length : notes.filter(n => n.category === c).length; }
function catIcon(c) { return CAT_ICONS[c] || '📁'; }

function renderAll() { renderCats(); renderList(); }

function renderCats() {
  document.getElementById('catList').innerHTML = cats().map(c => `
    <div class="cat-item${c === currentCat ? ' active' : ''}" onclick="selectCat('${c}')">
      ${catIcon(c)} ${c}
      <span class="cat-count">${catCount(c)}</span>
    </div>`).join('');
}

function selectCat(c) { currentCat = c; document.getElementById('listTitle').textContent = c; renderCats(); renderList(); }

function filtered() { return currentCat === '全部' ? notes : notes.filter(n => n.category === currentCat); }

function renderList() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  let list = filtered();
  if (q) list = list.filter(n => (n.title || '').toLowerCase().includes(q) || (n.content || '').toLowerCase().includes(q) || ((n.tags || []).join(' ')).toLowerCase().includes(q));
  document.getElementById('listCount').textContent = list.length + '篇';
  // 非「全部」分类且有笔记时显示分类删除按钮
  const catBtn = document.getElementById('deleteCatBtn');
  catBtn.style.display = (currentCat !== '全部' && list.length > 0) ? 'inline-block' : 'none';
  document.getElementById('noteItems').innerHTML = list.length ? list.map(n => `
    <div class="note-item${n.id === currentId ? ' active' : ''}" onclick="openNote('${n.id}')">
      <div class="note-title">${n.title || '无标题'}</div>
      <div class="note-preview">${(n.content || '').replace(/!\[.*?\]\(data:.*?\)/g, '[图片]').replace(/[#\->\`*!]/g, '').slice(0, 50)}</div>
      <div class="note-meta">
        ${(n.tags || []).slice(0, 3).map(t => `<span class="tag">${t}</span>`).join('')}
        <span class="note-date">${(n.updated_at || '').slice(0, 10)}</span>
      </div>
    </div>`).join('') : '<div class="loading">暂无笔记</div>';
}

function openNote(id) {
  currentId = id;
  const n = notes.find(x => x.id === id);
  if (!n) return;
  document.getElementById('emptyState').style.display = 'none';
  const ec = document.getElementById('editorContent');
  ec.style.display = 'flex'; ec.style.flexDirection = 'column';
  document.getElementById('noteTitle').value = n.title || '';
  document.getElementById('noteContent').value = n.content || '';
  document.getElementById('catSelect').value = n.category || '';
  renderEditorTags(n.tags || []);
  updateCount(); resetSaveBtn();
  if (viewMode === 'preview' || viewMode === 'split') updatePreview();
  renderList();
}

function renderEditorTags(tags) {
  document.getElementById('editorTags').innerHTML =
    tags.map(t => `<span class="etag">${t}<span class="etag-rm" onclick="removeTag('${t}')">×</span></span>`).join('') +
    `<input class="tag-input" placeholder="+ 添加标签" id="tagInput" onkeydown="addTag(event)">`;
}

function removeTag(t) { const n = notes.find(x => x.id === currentId); if (!n) return; n.tags = (n.tags || []).filter(x => x !== t); renderEditorTags(n.tags); }
function addTag(e) {
  if (e.key !== 'Enter') return;
  const v = e.target.value.trim(); if (!v) return;
  const n = notes.find(x => x.id === currentId);
  if (n) { n.tags = n.tags || []; if (!n.tags.includes(v)) n.tags.push(v); renderEditorTags(n.tags); }
  e.target.value = '';
}

function updateCount() { document.getElementById('wordCount').textContent = (document.getElementById('noteContent').value || '').length + ' 字'; }
function resetSaveBtn() { const b = document.getElementById('saveBtn'); b.textContent = '保存'; b.className = 'save-btn'; }

document.getElementById('noteTitle').oninput = resetSaveBtn;
document.getElementById('noteContent').oninput = () => {
  updateCount(); resetSaveBtn();
  if (viewMode === 'preview' || viewMode === 'split') updatePreview();
};

async function saveNote() {
  const n = notes.find(x => x.id === currentId);
  if (!n) return;
  n.title = document.getElementById('noteTitle').value || '无标题';
  n.content = document.getElementById('noteContent').value;
  n.category = document.getElementById('catSelect').value;
  n.updated_at = new Date().toISOString();
  const isNew = !n._saved;
  const method = isNew ? 'POST' : 'PATCH';
  const url = isNew ? API : API + '?id=eq.' + n.id;
  const body = isNew
    ? { title: n.title, content: n.content, category: n.category, tags: n.tags }
    : { title: n.title, content: n.content, category: n.category, tags: n.tags, updated_at: n.updated_at };
  const r = await fetch(url, { method, headers: { ...HEADERS, 'Prefer': 'return=representation' }, body: JSON.stringify(body) });
  const result = await r.json();
  if (isNew && Array.isArray(result) && result[0]) { n.id = result[0].id; }
  n._saved = true;
  const b = document.getElementById('saveBtn'); b.textContent = '✓ 已保存'; b.className = 'save-btn saved';
  toast('保存成功'); renderAll();
}

async function deleteNote() {
  if (!currentId) return;
  if (!confirm('确定删除这条笔记？')) return;
  const n = notes.find(x => x.id === currentId);
  if (n && n._saved) await fetch(API + '?id=eq.' + currentId, { method: 'DELETE', headers: HEADERS });
  notes = notes.filter(x => x.id !== currentId); currentId = null;
  document.getElementById('emptyState').style.display = '';
  document.getElementById('editorContent').style.display = 'none';
  toast('已删除'); renderAll();
}

// ── 全部删除 ─────────────────────────────────────────────
document.getElementById('deleteAllBtn').onclick = () => {
  const count = notes.filter(n => n._saved !== false).length;
  document.getElementById('deleteAllCount').textContent = `共 ${notes.length} 篇笔记`;
  document.getElementById('delProgressWrap').style.display = 'none';
  document.getElementById('delProgressLabel').textContent = '';
  document.getElementById('deleteAllBtns').style.display = 'flex';
  openModal('deleteAllModal');
};

async function confirmDeleteAll() {
  const toDelete = notes.filter(n => n._saved !== false);
  if (toDelete.length === 0) { closeModal('deleteAllModal'); toast('没有可删除的笔记'); return; }

  document.getElementById('deleteAllBtns').style.display = 'none';
  document.getElementById('delProgressWrap').style.display = 'block';

  let done = 0;
  for (const n of toDelete) {
    await fetch(API + '?id=eq.' + n.id, { method: 'DELETE', headers: HEADERS });
    done++;
    const pct = Math.round(done / toDelete.length * 100);
    document.getElementById('delProgressBar').style.width = pct + '%';
    document.getElementById('delProgressLabel').textContent = `已删除 ${done} / ${toDelete.length}`;
  }

  notes = []; currentId = null;
  document.getElementById('emptyState').style.display = '';
  document.getElementById('editorContent').style.display = 'none';
  closeModal('deleteAllModal');
  toast('✓ 全部删除完成');
  renderAll();
}

// ── 删除当前分类 ─────────────────────────────────────────
function openDeleteCat() {
  const catNotes = notes.filter(n => n.category === currentCat);
  document.getElementById('deleteCatName').textContent = '「' + currentCat + '」';
  document.getElementById('deleteCatCount').textContent = catNotes.length;
  document.getElementById('catDelProgressWrap').style.display = 'none';
  document.getElementById('catDelProgressLabel').textContent = '';
  document.getElementById('deleteCatBtns').style.display = 'flex';
  openModal('deleteCatModal');
}

async function confirmDeleteCat() {
  const toDelete = notes.filter(n => n.category === currentCat && n._saved !== false);
  if (toDelete.length === 0) { closeModal('deleteCatModal'); toast('没有可删除的笔记'); return; }

  document.getElementById('deleteCatBtns').style.display = 'none';
  document.getElementById('catDelProgressWrap').style.display = 'block';

  let done = 0;
  for (const n of toDelete) {
    await fetch(API + '?id=eq.' + n.id, { method: 'DELETE', headers: HEADERS });
    done++;
    const pct = Math.round(done / toDelete.length * 100);
    document.getElementById('catDelProgressBar').style.width = pct + '%';
    document.getElementById('catDelProgressLabel').textContent = `已删除 ${done} / ${toDelete.length}`;
  }

  // 若当前打开的笔记属于该分类，清空编辑器
  const deletedIds = toDelete.map(n => n.id);
  if (deletedIds.includes(currentId)) {
    currentId = null;
    document.getElementById('emptyState').style.display = '';
    document.getElementById('editorContent').style.display = 'none';
  }
  const deletedCat = currentCat;
  notes = notes.filter(n => n.category !== deletedCat || n._saved === false);
  currentCat = '全部';
  document.getElementById('listTitle').textContent = '全部';
  closeModal('deleteCatModal');
  toast('✓ 已删除「' + deletedCat + '」分类下所有笔记');
  renderAll();
}

// ── 批量导入物化复习资料 ─────────────────────────────────
document.getElementById('importBtn').onclick = () => {
  document.getElementById('impProgressWrap').style.display = 'none';
  document.getElementById('impProgressLabel').textContent = '';
  document.getElementById('importBtns').style.display = 'flex';
  openModal('importModal');
};

async function confirmImport() {
  document.getElementById('importBtns').style.display = 'none';
  document.getElementById('impProgressWrap').style.display = 'block';

  let done = 0;
  for (const note of PCHEM_NOTES) {
    const body = {
      title: note.title,
      content: note.content,
      category: note.category,
      tags: note.tags,
      updated_at: new Date().toISOString()
    };
    const r = await fetch(API, {
      method: 'POST',
      headers: { ...HEADERS, 'Prefer': 'return=representation' },
      body: JSON.stringify(body)
    });
    const result = await r.json();
    if (Array.isArray(result) && result[0]) {
      notes.unshift({ ...result[0], _saved: true });
    }
    done++;
    const pct = Math.round(done / PCHEM_NOTES.length * 100);
    document.getElementById('impProgressBar').style.width = pct + '%';
    document.getElementById('impProgressLabel').textContent = `已导入 ${done} / ${PCHEM_NOTES.length}：${note.title.slice(0, 18)}...`;
  }

  closeModal('importModal');
  toast('✓ 导入完成！共 ' + PCHEM_NOTES.length + ' 篇');
  currentCat = '物理化学实验';
  document.getElementById('listTitle').textContent = '物理化学实验';
  renderAll();
}

// ── 新建笔记 ─────────────────────────────────────────────
document.getElementById('newBtn').onclick = () => {
  const n = {
    id: 'new-' + Date.now(), title: '', content: '',
    category: currentCat === '全部' ? '其他' : currentCat,
    tags: [], updated_at: new Date().toISOString(), _saved: false
  };
  notes.unshift(n); renderList(); openNote(n.id);
};

document.getElementById('searchInput').oninput = renderList;

function ins(pre, suf) {
  const ta = document.getElementById('noteContent');
  const s = ta.selectionStart, e = ta.selectionEnd;
  const sel = ta.value.slice(s, e);
  ta.value = ta.value.slice(0, s) + pre + sel + suf + ta.value.slice(e);
  ta.selectionStart = s + pre.length; ta.selectionEnd = s + pre.length + sel.length;
  ta.focus(); if (viewMode === 'split' || viewMode === 'preview') updatePreview();
}
function insLine(pre) {
  const ta = document.getElementById('noteContent');
  const s = ta.selectionStart;
  const start = ta.value.lastIndexOf('\n', s - 1) + 1;
  ta.value = ta.value.slice(0, start) + pre + ta.value.slice(start);
  ta.selectionStart = ta.selectionEnd = s + pre.length;
  ta.focus(); if (viewMode === 'split' || viewMode === 'preview') updatePreview();
}

fetchNotes();
</script>
