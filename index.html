<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的知识库</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"></script>
<style>
/* ── Reset & Base ── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB',sans-serif;font-size:14px;background:#f5f5f0;color:#1a1a1a;}

/* ── CSS Variables ── */
:root{
  --accent:#4f46e5;--accent-hover:#4338ca;--accent-light:#ede9fe;--accent-mid:#a5b4fc;
  --bg:#f5f5f0;--bg2:#fafaf8;--white:#fff;
  --border:#e8e8e4;--border2:#f0f0ec;
  --text:#1a1a1a;--text2:#555;--text3:#888;--text4:#bbb;
  --danger:#ef4444;--danger-bg:#fef2f2;--danger-border:#fca5a5;
  --success:#10b981;
  --sidebar-w:220px;--list-w:230px;
  --header-h:56px;
}

/* ── Layout ── */
.app{display:flex;height:100vh;height:100dvh;position:relative}

/* ── Sidebar ── */
.sidebar{
  width:var(--sidebar-w);min-width:var(--sidebar-w);
  background:var(--white);border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  transition:transform .25s ease;
  z-index:200;
}
.sidebar-top{padding:14px 12px 10px;border-bottom:1px solid var(--border)}
.app-title{font-size:15px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.search-box{display:flex;align-items:center;gap:6px;background:var(--bg);border:1px solid #e0e0db;border-radius:8px;padding:7px 10px}
.search-box input{border:none;background:transparent;font-size:13px;color:var(--text);outline:none;width:100%}
.search-box input::placeholder{color:var(--text4)}
.section-label{padding:10px 14px 4px;font-size:11px;font-weight:600;color:var(--text4);text-transform:uppercase;letter-spacing:.06em}
.cat-list{padding:0 8px;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.cat-item{display:flex;align-items:center;padding:7px 8px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--text2);margin-bottom:2px;justify-content:space-between;transition:background .1s}
.cat-item-left{display:flex;align-items:center;gap:8px;flex:1;overflow:hidden;min-height:36px}
.cat-item-left span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cat-item:hover,.cat-item:active{background:var(--bg)}
.cat-item.active{background:var(--accent-light);color:var(--accent-hover)}
.cat-count{font-size:11px;color:var(--text4);background:var(--border2);padding:2px 7px;border-radius:99px;flex-shrink:0}
.cat-item.active .cat-count{background:#e0defa;color:#6366f1}
.cat-delete-btn{background:transparent;border:none;cursor:pointer;font-size:15px;padding:4px 6px;border-radius:6px;color:var(--text4);transition:all .15s;line-height:1;flex-shrink:0}
.cat-item:hover .cat-delete-btn{color:var(--danger)}
.cat-delete-btn:hover,.cat-delete-btn:active{color:var(--danger)!important;background:var(--danger-bg)}
.new-btn{margin:10px;padding:10px 12px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:inherit;justify-content:center;font-weight:500;transition:background .15s;min-height:44px}
.new-btn:hover,.new-btn:active{background:var(--accent-hover)}

/* ── Note List ── */
.note-list{
  width:var(--list-w);min-width:var(--list-w);
  background:var(--bg2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  transition:transform .25s ease;
  z-index:150;
}
.list-header{padding:10px 14px;font-size:13px;font-weight:500;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;color:var(--text2);min-height:44px}
.note-items{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.note-item{padding:12px 14px;border-bottom:1px solid var(--border2);cursor:pointer;transition:background .1s;position:relative}
.note-item:hover,.note-item.active{background:var(--accent-light)}
.note-title{font-size:13px;font-weight:500;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.note-preview{font-size:12px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:6px}
.note-meta{display:flex;gap:4px;align-items:center;flex-wrap:wrap}
.tag{font-size:10px;padding:2px 6px;border-radius:99px;background:var(--accent-light);color:var(--accent-hover)}
.note-date{font-size:10px;color:var(--text4);margin-left:auto}

/* ── Editor ── */
.editor{flex:1;display:flex;flex-direction:column;background:var(--white);min-width:0;min-height:0;overflow:hidden}
.toolbar{padding:8px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:4px;flex-wrap:wrap;background:var(--white)}
.tb-btn{padding:5px 9px;border:1px solid var(--border);border-radius:6px;background:transparent;font-size:12px;cursor:pointer;color:var(--text2);font-family:inherit;transition:background .1s;min-height:32px}
.tb-btn:hover,.tb-btn:active{background:var(--bg)}
.tb-btn.active{background:var(--accent-light);border-color:var(--accent-mid);color:var(--accent-hover)}
select.tb-select{padding:5px 8px;border:1px solid var(--border);border-radius:6px;background:var(--white);font-size:12px;color:var(--text2);font-family:inherit;cursor:pointer;min-height:32px}
.img-upload-btn{padding:5px 10px;border:1px solid var(--border);border-radius:6px;background:transparent;font-size:12px;cursor:pointer;color:var(--text2);font-family:inherit;display:flex;align-items:center;gap:4px;min-height:32px}
.img-upload-btn:hover,.img-upload-btn:active{background:var(--bg)}
#imgUploadInput{display:none}
.editor-title{padding:14px 18px 8px;font-size:20px;font-weight:700;border:none;outline:none;background:transparent;color:var(--text);font-family:inherit;width:100%}
.editor-tags{padding:4px 18px 8px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;border-bottom:1px solid var(--border2)}
.etag{font-size:12px;padding:3px 10px;border-radius:99px;background:var(--accent-light);color:var(--accent-hover);display:flex;align-items:center;gap:4px}
.etag-rm{cursor:pointer;opacity:.6;font-size:14px;line-height:1}
.etag-rm:hover,.etag-rm:active{opacity:1}
.tag-input{font-size:13px;border:none;outline:none;background:transparent;color:var(--text3);min-width:80px;font-family:inherit;padding:2px 0}
.tag-input::placeholder{color:#ccc}
.editor-area{flex:1;display:flex;overflow:hidden;min-height:0}
.edit-pane{flex:1;padding:12px 18px;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;min-height:0}
.edit-pane textarea{width:100%;height:100%;min-height:200px;border:none;outline:none;resize:none;font-size:14px;line-height:1.9;color:var(--text);background:transparent;font-family:'Menlo','Monaco','Courier New',monospace}
.preview-pane{flex:1;padding:16px 22px;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;display:none;border-left:1px solid var(--border2);min-height:0}
.preview-pane.show{display:block}
.split-view .edit-pane,.split-view .preview-pane{flex:1;display:block}
.editor-footer{padding:8px 18px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--white)}
.word-count{font-size:12px;color:var(--text4)}
.footer-btns{display:flex;gap:8px}
.del-btn{padding:7px 14px;border:1px solid var(--danger-border);border-radius:8px;background:transparent;color:var(--danger);font-size:13px;cursor:pointer;font-family:inherit;min-height:38px;transition:background .1s}
.del-btn:hover,.del-btn:active{background:var(--danger-bg)}
.save-btn{padding:7px 18px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;min-height:38px;transition:background .15s;font-weight:500}
.save-btn:hover,.save-btn:active{background:var(--accent-hover)}
.save-btn.saved{background:var(--success)}
.save-btn:disabled{opacity:.6;cursor:not-allowed}

/* ── Download button ── */
.download-btn{padding:5px 10px;border:1px solid var(--border);border-radius:6px;background:transparent;font-size:12px;cursor:pointer;color:var(--text2);font-family:inherit;display:flex;align-items:center;gap:4px;min-height:32px;transition:background .1s}
.download-btn:hover,.download-btn:active{background:var(--bg);color:var(--accent)}

/* ── Empty / Loading ── */
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#ccc;gap:12px;font-size:14px;text-align:center;padding:24px}
.empty svg{width:48px;height:48px;opacity:.25}
.loading{text-align:center;padding:24px;color:var(--text4);font-size:13px}

/* ── Toast ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);background:#1a1a1a;color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;z-index:999;white-space:nowrap;max-width:90vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Upload progress ── */
.upload-progress{font-size:11px;color:#6366f1;padding:2px 6px}

/* ── Preview styles ── */
.math-block{overflow-x:auto;margin:12px 0;padding:8px;background:#f9f9ff;border-radius:6px;text-align:center}
.katex-display{margin:0}
.preview-pane h1{font-size:20px;font-weight:700;margin:0 0 12px;color:var(--text);border-bottom:2px solid var(--border);padding-bottom:8px}
.preview-pane h2{font-size:17px;font-weight:600;margin:18px 0 8px;color:var(--text);border-bottom:1px solid var(--border2);padding-bottom:4px}
.preview-pane h3{font-size:15px;font-weight:600;margin:14px 0 6px;color:#333}
.preview-pane p{margin:0 0 10px;line-height:1.8;color:#333}
.preview-pane ul,.preview-pane ol{margin:0 0 10px 20px;line-height:1.8;color:#333}
.preview-pane li{margin-bottom:3px}
.preview-pane blockquote{border-left:3px solid var(--accent-mid);padding:6px 12px;margin:10px 0;background:#f9f9ff;color:var(--text2);border-radius:0 6px 6px 0}
.preview-pane code{background:var(--border2);padding:1px 5px;border-radius:4px;font-family:monospace;font-size:13px;color:#d63384}
.preview-pane pre{background:var(--bg);padding:12px;border-radius:8px;overflow-x:auto;margin:10px 0}
.preview-pane pre code{background:none;padding:0;color:var(--text)}
.preview-pane img{max-width:100%;border-radius:8px;margin:8px 0;box-shadow:0 2px 8px rgba(0,0,0,.1);display:block}
.preview-pane strong{font-weight:600;color:var(--text)}
.preview-pane em{font-style:italic;color:var(--text2)}
.preview-pane hr{border:none;border-top:1px solid var(--border);margin:16px 0}
.preview-pane table{width:100%;border-collapse:collapse;margin:10px 0;font-size:13px;display:block;overflow-x:auto}
.preview-pane th{background:var(--accent-light);padding:7px 10px;text-align:left;font-weight:600;border:1px solid #e0defa}
.preview-pane td{padding:6px 10px;border:1px solid var(--border)}
.preview-pane tr:nth-child(even){background:#f9f9ff}

/* ── Mobile overlay ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:190;backdrop-filter:blur(2px)}
.overlay.show{display:block}

/* ── Mobile bottom nav ── */
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--border);z-index:300;padding:6px 0 calc(6px + env(safe-area-inset-bottom));justify-content:space-around}
.mobile-nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 12px;background:transparent;border:none;cursor:pointer;color:var(--text3);font-size:10px;font-family:inherit;flex:1;transition:color .15s}
.mobile-nav-btn.active{color:var(--accent)}
.mobile-nav-btn svg{width:22px;height:22px}
.mobile-nav-btn span{font-size:10px}

/* ── Mobile header ── */
.mobile-header{display:none;align-items:center;padding:0 14px;height:var(--header-h);border-bottom:1px solid var(--border);background:var(--white);gap:10px;position:sticky;top:0;z-index:100}
.mobile-header-title{font-size:15px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mobile-back-btn{background:transparent;border:none;cursor:pointer;padding:6px;color:var(--accent);font-size:14px;display:flex;align-items:center;gap:4px;font-family:inherit}

/* ── Responsive ── */
@media (max-width: 768px) {
  :root{--header-h:52px}
  .app{flex-direction:column;height:100dvh;overflow:hidden}

  /* Hide desktop three-pane layout */
  .sidebar,.note-list,.editor{
    position:fixed;inset:0;
    width:100%!important;min-width:unset!important;
    border:none;
    transition:transform .28s cubic-bezier(.4,0,.2,1);
    z-index:10;
    height:100dvh;
    overflow:hidden;
  }

  /* Sidebar: slides in from left */
  .sidebar{transform:translateX(-100%);z-index:200;padding-bottom:calc(env(safe-area-inset-bottom) + 60px)}
  .sidebar.open{transform:translateX(0)}

  /* Note list: default view */
  .note-list{transform:translateX(0);z-index:100;padding-bottom:calc(env(safe-area-inset-bottom) + 60px)}
  .note-list.hidden{transform:translateX(-100%)}

  /* Editor: slides in from right */
  .editor{transform:translateX(100%);z-index:150;padding-bottom:calc(env(safe-area-inset-bottom) + 60px)}
  .editor.open{transform:translateX(0)}

  .mobile-nav{display:flex}
  .mobile-header{display:flex}

  /* Adjust font sizes for mobile */
  .editor-title{font-size:18px;padding:12px 14px 6px}
  .editor-tags{padding:4px 14px 8px}
  .edit-pane{padding:10px 14px}
  .edit-pane textarea{font-size:15px;line-height:1.8}
  .editor-footer{padding:8px 14px}
  .toolbar{padding:8px 10px;gap:6px;overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch}
  .tb-btn,.download-btn,.img-upload-btn{min-height:36px;font-size:13px;padding:5px 10px;flex-shrink:0}
  select.tb-select{min-height:36px;flex-shrink:0}

  .note-items{padding-bottom:8px}
  .note-item{padding:14px}
  .note-title{font-size:14px}
  .note-preview{font-size:13px}

  /* List header with back to categories */
  .list-header{min-height:var(--header-h)}
}

@media (min-width:769px) and (max-width:1024px){
  /* Tablet: sidebar collapses, show note-list + editor */
  :root{--sidebar-w:200px;--list-w:200px}
  .app-title{font-size:14px}
}
</style>
</head>
<body>
<!-- Mobile overlay -->
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<div class="app">
  <!-- ── Sidebar ── -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-top">
      <div class="app-title">📚 我的知识库</div>
      <div class="search-box">
        <svg width="14" height="14" fill="none" stroke="#aaa" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" placeholder="搜索笔记..." id="searchInput">
      </div>
    </div>
    <div class="section-label">分类</div>
    <div class="cat-list" id="catList"></div>
    <button class="new-btn" id="newBtn">＋ 新建笔记</button>
  </div>

  <!-- ── Note List ── -->
  <div class="note-list" id="noteList">
    <!-- Mobile header for note list -->
    <div class="mobile-header" id="listMobileHeader">
      <button class="mobile-back-btn" onclick="openSidebar()">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M3 12h18M3 6l-3 6 3 6"/></svg>
      </button>
      <span class="mobile-header-title" id="listTitle">全部笔记</span>
      <span id="listCount" style="font-size:12px;color:var(--text4)"></span>
    </div>
    <!-- Desktop header (shown via CSS) -->
    <div class="list-header" style="display:none" id="listHeaderDesktop">
      <span id="listTitleDesktop">全部笔记</span>
      <span id="listCountDesktop" style="font-size:12px;color:var(--text4)"></span>
    </div>
    <div class="note-items" id="noteItems"></div>
  </div>

  <!-- ── Editor ── -->
  <div class="editor" id="editor">
    <div id="emptyState" class="empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
      <span>选择笔记或新建一篇</span>
    </div>
    <div id="editorContent" style="display:none;flex:1;flex-direction:column">
      <!-- Mobile header for editor -->
      <div class="mobile-header">
        <button class="mobile-back-btn" onclick="closeEditor()">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
          返回
        </button>
        <span class="mobile-header-title" id="editorMobileTitle">笔记</span>
        <button class="save-btn" id="saveBtnMobile" onclick="saveNote()" style="padding:6px 14px;font-size:13px;min-height:34px">保存</button>
      </div>

      <div class="toolbar">
        <button class="tb-btn" onclick="ins('**','**')"><b>B</b></button>
        <button class="tb-btn" onclick="ins('*','*')"><i>I</i></button>
        <button class="tb-btn" onclick="insLine('## ')">H2</button>
        <button class="tb-btn" onclick="insLine('### ')">H3</button>
        <button class="tb-btn" onclick="insLine('- ')">列表</button>
        <button class="tb-btn" onclick="insLine('> ')">引用</button>
        <button class="tb-btn" onclick="ins('\`','\`')">代码</button>
        <button class="tb-btn" onclick="insLine('---')">分割线</button>
        <label class="img-upload-btn" title="插入图片">
          🖼 图片
          <input type="file" id="imgUploadInput" accept="image/*" onchange="uploadImage(this)">
        </label>
        <span id="uploadProgress" class="upload-progress"></span>
        <span style="flex:1;min-width:4px"></span>
        <button class="download-btn" onclick="downloadNote()" title="下载笔记">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          下载
        </button>
        <button class="tb-btn" id="previewBtn" onclick="togglePreview()">👁 预览</button>
        <button class="tb-btn" id="splitBtn" onclick="toggleSplit()">⬛ 分屏</button>
        <select class="tb-select" id="catSelect">
          <option value="">选择分类</option>
          <option>有机化学</option>
          <option>无机化学</option>
          <option>分析化学</option>
          <option>物理化学</option>
          <option>编程</option>
          <option>数学</option>
          <option>英语</option>
          <option>读书笔记</option>
          <option>其他</option>
        </select>
      </div>

      <input class="editor-title" id="noteTitle" placeholder="笔记标题...">
      <div class="editor-tags" id="editorTags"></div>
      <div class="editor-area" id="editorArea">
        <div class="edit-pane" id="editPane">
          <textarea id="noteContent" placeholder="开始记录你的想法...&#10;&#10;支持 Markdown 格式：&#10;## 标题&#10;**粗体** *斜体*&#10;- 列表项&#10;&gt; 引用"></textarea>
        </div>
        <div class="preview-pane" id="previewPane"></div>
      </div>
      <div class="editor-footer">
        <span class="word-count" id="wordCount">0 字</span>
        <div class="footer-btns">
          <button class="del-btn" onclick="deleteNote()">删除</button>
          <button class="save-btn" id="saveBtn" onclick="saveNote()">保存</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Mobile bottom nav -->
<nav class="mobile-nav">
  <button class="mobile-nav-btn active" id="navCat" onclick="mobileNav('cat')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    <span>分类</span>
  </button>
  <button class="mobile-nav-btn" id="navList" onclick="mobileNav('list')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
    <span>笔记</span>

// ── Markdown 渲染 ─────────────────────────────────────────
function mdToHtml(md){
  let codeBlocks=[],inlineCodes=[],mathBlocks=[],mathInlines=[],tableBlocks=[];
  md=md.replace(/```([\s\S]*?)```/g,(_,c)=>{codeBlocks.push(c.trim());return 'CODEBLOCK'+(codeBlocks.length-1)+'END';});
  md=md.replace(/`([^`]+)`/g,(_,c)=>{inlineCodes.push(c);return 'INLINECODE'+(inlineCodes.length-1)+'END';});
  md=md.replace(/\$\$([\s\S]+?)\$\$/g,(_,f)=>{mathBlocks.push(f);return 'MATHBLOCK'+(mathBlocks.length-1)+'END';});
  md=md.replace(/\$([^\$\n]+?)\$/g,(_,f)=>{mathInlines.push(f);return 'MATHINLINE'+(mathInlines.length-1)+'END';});
  md=md.replace(/((?:^\|.+\|\s*\n)+)/gm,match=>{
    var lines=match.trim().split('\n').filter(l=>l.trim());
    var result='<table>',headerDone=false;
    for(var i=0;i<lines.length;i++){
      var line=lines[i].trim();
      if(!line) continue;
      if(/^\|[\s\-:]+\|$/.test(line.replace(/[^|\-: ]/g,''))){headerDone=true;continue;}
      var cells=line.split('|').slice(1,-1).map(c=>c.trim());
      if(!headerDone){result+='<thead><tr>'+cells.map(c=>'<th>'+c+'</th>').join('')+'</tr></thead><tbody>';}
      else{result+='<tr>'+cells.map(c=>'<td>'+c+'</td>').join('')+'</tr>';}
    }
    if(headerDone) result+='</tbody>';
    result+='</table>';
    tableBlocks.push(result);
    return 'TABLEBLOCK'+(tableBlocks.length-1)+'END\n';
  });
  let h=md.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  h=h.replace(/!\[([^\]]*)\]\(([^)]+)\)/g,'<img src="$2" alt="$1" style="max-width:100%;border-radius:8px;margin:8px 0;display:block">');
  h=h.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" style="color:#4338ca">$1</a>');
  var lines=h.split('\n'),out=[];
  for(var i=0;i<lines.length;i++){
    var line=lines[i];
    if(/^#### /.test(line)){out.push('<h4 style="font-size:13px;font-weight:600;margin:12px 0 4px;color:#555">'+line.slice(5)+'</h4>');continue;}
    if(/^### /.test(line)){out.push('<h3>'+line.slice(4)+'</h3>');continue;}
    if(/^## /.test(line)){out.push('<h2>'+line.slice(3)+'</h2>');continue;}
    if(/^# /.test(line)){out.push('<h1>'+line.slice(2)+'</h1>');continue;}
    if(/^---+$/.test(line.trim())){out.push('<hr>');continue;}
    if(/^&gt; /.test(line)){out.push('<blockquote>'+line.slice(5)+'</blockquote>');continue;}
    if(/^\d+\. /.test(line)){out.push('<li>'+line.replace(/^\d+\. /,'')+'</li>');continue;}
    if(/^[-*] /.test(line)){out.push('<li>'+line.slice(2)+'</li>');continue;}
    if(line.trim()===''){out.push('<br>');continue;}
    out.push('<p>'+line+'</p>');
  }
  h=out.join('\n');
  h=h.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>');
  h=h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  h=h.replace(/\*([^*\n]+?)\*/g,'<em>$1</em>');
  h=h.replace(/((?:<li>[\s\S]*?<\/li>\n?)+)/g,'<ul>$1</ul>');
  h=h.replace(/CODEBLOCK(\d+)END/g,(_,i)=>'<pre><code>'+codeBlocks[i].replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>')+'</code></pre>');
  h=h.replace(/INLINECODE(\d+)END/g,(_,i)=>'<code>'+inlineCodes[i]+'</code>');
  h=h.replace(/TABLEBLOCK(\d+)END/g,(_,i)=>tableBlocks[i]);
  h=h.replace(/MATHBLOCK(\d+)END/g,(_,i)=>{try{return '<div class="math-block">'+katex.renderToString(mathBlocks[i],{displayMode:true,throwOnError:false})+'</div>';}catch(e){return '<div class="math-block">$$'+mathBlocks[i]+'$$</div>';}});
  h=h.replace(/MATHINLINE(\d+)END/g,(_,i)=>{try{return katex.renderToString(mathInlines[i],{displayMode:false,throwOnError:false});}catch(e){return '$'+mathInlines[i]+'$';}});
  return h;
}

  toast(`删除中...`,1500);
  try{
    const res=await fetch(API+'?category=eq.'+encodeURIComponent(categoryName),{method:'DELETE',headers:HEADERS});
    if(res.ok){
      notes=notes.filter(n=>n.category!==categoryName);
      if(currentId&&!notes.find(n=>n.id===currentId)){
        currentId=null;
        document.getElementById('emptyState').style.display='';
        document.getElementById('editorContent').style.display='none';

      if(currentCat===categoryName) currentCat='全部';
      renderAll();
      toast(`✅ 已删除分类「${categoryName}」及 ${count} 条笔记`,2500);
    } else {
      toast('删除失败',2000);
    }
  } catch(err){toast('删除出错: '+err.message,2000);}
};

function selectCat(c){
  currentCat=c;
  document.getElementById('listTitle').textContent=c;
  document.getElementById('listTitleDesktop').textContent=c;
  renderCats();renderList();
  if(isMobile()) closeSidebar();
}

function filtered(){return currentCat==='全部'?notes:notes.filter(n=>n.category===currentCat);}

function renderList(){
  const q=document.getElementById('searchInput').value.trim().toLowerCase();
  let list=filtered();
  if(q) list=list.filter(n=>(n.title||'').toLowerCase().includes(q)||(n.content||'').toLowerCase().includes(q)||((n.tags||[]).join(' ')).toLowerCase().includes(q));
  const countStr=list.length+'篇';
  document.getElementById('listCount').textContent=countStr;
  document.getElementById('listCountDesktop').textContent=countStr;
  document.getElementById('noteItems').innerHTML=list.length?list.map(n=>`
    <div class="note-item${n.id===currentId?' active':''}" onclick="openNote('${n.id}')">
      <div class="note-title">${escapeHtml(n.title||'无标题')}</div>
      <div class="note-preview">${escapeHtml((n.content||'').replace(/!\[.*?\]\(data:.*?\)/g,'[图片]').replace(/[#\->`*!]/g,'').slice(0,60))}</div>
      <div class="note-meta">
        ${(n.tags||[]).slice(0,3).map(t=>`<span class="tag">${escapeHtml(t)}</span>`).join('')}
        <span class="note-date">${(n.updated_at||'').slice(0,10)}</span>
      </div>
    </div>`).join(''):'<div class="loading">暂无笔记</div>';
}

function escapeHtml(str){
  if(!str) return '';
  return str.replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function openNote(id){
  currentId=id;
  const n=notes.find(x=>x.id===id);
  if(!n) return;
  document.getElementById('emptyState').style.display='none';
  const ec=document.getElementById('editorContent');
  ec.style.display='flex';ec.style.flexDirection='column';
  document.getElementById('noteTitle').value=n.title||'';
  document.getElementById('editorMobileTitle').textContent=n.title||'无标题';
  document.getElementById('noteContent').value=n.content||'';
  document.getElementById('catSelect').value=n.category||'';
  renderEditorTags(n.tags||[]);
  updateCount();resetSaveBtn();
  if(viewMode==='preview'||viewMode==='split') updatePreview();
  renderList();
  if(isMobile()) openEditorMobile();
}

function renderEditorTags(tags){
  document.getElementById('editorTags').innerHTML=
    tags.map(t=>`<span class="etag">${escapeHtml(t)}<span class="etag-rm" onclick="removeTag('${t.replace(/'/g,"\\'").replace(/"/g,'&quot;')}')">×</span></span>`).join('')+
    `<input class="tag-input" placeholder="+ 添加标签" id="tagInput" onkeydown="addTag(event)">`;
}

function removeTag(t){const n=notes.find(x=>x.id===currentId);if(!n)return;n.tags=(n.tags||[]).filter(x=>x!==t);renderEditorTags(n.tags);}
function addTag(e){
  if(e.key!=='Enter') return;
  const v=e.target.value.trim();if(!v) return;
  const n=notes.find(x=>x.id===currentId);
  if(n){n.tags=n.tags||[];if(!n.tags.includes(v))n.tags.push(v);renderEditorTags(n.tags);}
  e.target.value='';
}

function updateCount(){document.getElementById('wordCount').textContent=(document.getElementById('noteContent').value||'').length+' 字';}
function resetSaveBtn(){
  ['saveBtn','saveBtnMobile'].forEach(id=>{
    const b=document.getElementById(id);
    if(b){b.textContent='保存';b.className=id==='saveBtn'?'save-btn':'save-btn';b.disabled=false;}
  });
}

document.getElementById('noteTitle').oninput=()=>{
  resetSaveBtn();
  const v=document.getElementById('noteTitle').value;
  document.getElementById('editorMobileTitle').textContent=v||'笔记';
};
document.getElementById('noteContent').oninput=()=>{
  updateCount();resetSaveBtn();
  if(viewMode==='preview'||viewMode==='split') updatePreview();
};

// ── 保存笔记 ──────────────────────────────────────────────
async function saveNote(){
  const n=notes.find(x=>x.id===currentId);
  if(!n) return;
  n.title=document.getElementById('noteTitle').value.trim()||'无标题';
  n.content=document.getElementById('noteContent').value;
  n.category=document.getElementById('catSelect').value||'其他';
  n.updated_at=new Date().toISOString();

  ['saveBtn','saveBtnMobile'].forEach(id=>{
    const b=document.getElementById(id);
    if(b){b.textContent='保存中...';b.disabled=true;}
  });

  try{
    if(!n._saved){
      const body={title:n.title,content:n.content,category:n.category,tags:n.tags||[],updated_at:n.updated_at};
      const r=await fetch(API,{method:'POST',headers:{...HEADERS,'Prefer':'return=representation'},body:JSON.stringify(body)});
      if(!r.ok) throw new Error(await r.text());
      const result=await r.json();
      if(Array.isArray(result)&&result[0]){
        const oldId=n.id;
        n.id=result[0].id;
        n.updated_at=result[0].updated_at||n.updated_at;
        if(currentId===oldId) currentId=n.id;
      }
      n._saved=true;
    } else {
      const body={title:n.title,content:n.content,category:n.category,tags:n.tags||[],updated_at:n.updated_at};
      const r=await fetch(API+'?id=eq.'+n.id,{method:'PATCH',headers:{...HEADERS,'Prefer':'return=representation'},body:JSON.stringify(body)});
      if(!r.ok) throw new Error(await r.text());
    }
    ['saveBtn','saveBtnMobile'].forEach(id=>{
      const b=document.getElementById(id);
      if(b){b.textContent='✓ 已保存';b.className='save-btn saved';b.disabled=false;}
    });
    toast('保存成功');
    renderAll();
  } catch(e){
    console.error('保存失败:',e);
    ['saveBtn','saveBtnMobile'].forEach(id=>{
      const b=document.getElementById(id);
      if(b){b.textContent='保存';b.disabled=false;}
    });
    toast('保存失败: '+e.message,3000);
  }
}

async function deleteNote(){
  if(!currentId) return;
  if(!confirm('确定删除这条笔记？')) return;
  const n=notes.find(x=>x.id===currentId);
  if(n&&n._saved) await fetch(API+'?id=eq.'+currentId,{method:'DELETE',headers:HEADERS});
  notes=notes.filter(x=>x.id!==currentId);currentId=null;
  document.getElementById('emptyState').style.display='';
  document.getElementById('editorContent').style.display='none';
  if(isMobile()){
    document.getElementById('navEdit').style.display='none';
    mobileNav('list');
  }
  toast('已删除');renderAll();
}

function createNewNote(){
  const n={id:'tmp-'+Date.now(),title:'',content:'',category:currentCat==='全部'?'其他':currentCat,tags:[],updated_at:new Date().toISOString(),_saved:false};
  notes.unshift(n);renderList();openNote(n.id);
  setTimeout(()=>document.getElementById('noteTitle').focus(),100);
}

document.getElementById('newBtn').onclick=createNewNote;
document.getElementById('searchInput').oninput=renderList;

function ins(pre,suf){
  const ta=document.getElementById('noteContent');
  const s=ta.selectionStart,e=ta.selectionEnd;
  const sel=ta.value.slice(s,e);
  ta.value=ta.value.slice(0,s)+pre+sel+suf+ta.value.slice(e);
  ta.selectionStart=s+pre.length;ta.selectionEnd=s+pre.length+sel.length;
  ta.focus();if(viewMode==='split'||viewMode==='preview') updatePreview();
}
function insLine(pre){
  const ta=document.getElementById('noteContent');
  const s=ta.selectionStart;
  const start=ta.value.lastIndexOf('\n',s-1)+1;
  ta.value=ta.value.slice(0,start)+pre+ta.value.slice(start);
  ta.selectionStart=ta.selectionEnd=s+pre.length;
  ta.focus();if(viewMode==='split'||viewMode==='preview') updatePreview();
}

// ── Init ─────────────────────────────────────────────────
applyResponsive();
fetchNotes();
</script>
