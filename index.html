<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的知识库 - 可管理分类</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"></script>
<script src="https://unpkg.com/smiles-drawer@2.1.7/dist/smiles-drawer.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;background:#f5f5f0;color:#1a1a1a;height:100vh;overflow:hidden}
.app{display:flex;height:100vh}
.sidebar{width:220px;min-width:220px;background:#fff;border-right:1px solid #e8e8e4;display:flex;flex-direction:column}
.sidebar-top{padding:14px 12px 10px;border-bottom:1px solid #e8e8e4}
.app-title{font-size:15px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.search-box{display:flex;align-items:center;gap:6px;background:#f5f5f0;border:1px solid #e0e0db;border-radius:8px;padding:6px 8px}
.search-box input{border:none;background:transparent;font-size:13px;color:#1a1a1a;outline:none;width:100%}
.search-box input::placeholder{color:#aaa}
.section-label{padding:10px 14px 4px;font-size:11px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:0.06em}
.cat-list{padding:0 8px;flex:1;overflow-y:auto}
.cat-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:7px;cursor:pointer;font-size:13px;color:#555;margin-bottom:2px;justify-content:space-between}
.cat-item-left{display:flex;align-items:center;gap:8px;flex:1;overflow:hidden}
.cat-item-left span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cat-item:hover{background:#f5f5f0}
.cat-item.active{background:#f0eefc;color:#4338ca}
.cat-count{margin-left:auto;font-size:11px;color:#bbb;background:#f0f0ec;padding:1px 7px;border-radius:99px;flex-shrink:0}
.cat-item.active .cat-count{background:#e0defa;color:#6366f1}
.cat-delete-btn{background:transparent;border:none;cursor:pointer;font-size:14px;padding:2px 5px;border-radius:20px;color:#aaa;opacity:0;transition:all 0.1s;font-weight:bold;line-height:1}
.cat-item:hover .cat-delete-btn{opacity:0.6}
.cat-delete-btn:hover{opacity:1 !important;color:#ef4444;background:#fee2e2}
.new-btn{margin:10px;padding:8px 12px;background:#4f46e5;color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:inherit;justify-content:center}
.new-btn:hover{background:#4338ca}
.note-list{width:230px;min-width:230px;background:#fafaf8;border-right:1px solid #e8e8e4;display:flex;flex-direction:column}
.list-header{padding:10px 14px;font-size:13px;font-weight:500;border-bottom:1px solid #e8e8e4;display:flex;align-items:center;justify-content:space-between;color:#555}
.note-items{flex:1;overflow-y:auto}
.note-item{padding:10px 14px;border-bottom:1px solid #f0f0ec;cursor:pointer}
.note-item:hover,.note-item.active{background:#f0eefc}
.note-title{font-size:13px;font-weight:500;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#1a1a1a}
.note-preview{font-size:12px;color:#888;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:5px}
.note-meta{display:flex;gap:4px;align-items:center;flex-wrap:wrap}
.tag{font-size:10px;padding:2px 6px;border-radius:99px;background:#ede9fe;color:#4338ca}
.note-date{font-size:10px;color:#bbb;margin-left:auto}
.editor{flex:1;display:flex;flex-direction:column;background:#fff;min-width:0;min-height:0;overflow:hidden}
.toolbar{padding:8px 16px;border-bottom:1px solid #e8e8e4;display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.tb-btn{padding:4px 8px;border:1px solid #e8e8e4;border-radius:6px;background:transparent;font-size:12px;cursor:pointer;color:#555;font-family:inherit}
.tb-btn:hover{background:#f5f5f0}
.tb-btn.active{background:#ede9fe;border-color:#a5b4fc;color:#4338ca}
select.tb-select{padding:4px 8px;border:1px solid #e8e8e4;border-radius:6px;background:#fff;font-size:12px;color:#555;font-family:inherit;cursor:pointer}
.img-upload-btn{padding:4px 10px;border:1px solid #e8e8e4;border-radius:6px;background:transparent;font-size:12px;cursor:pointer;color:#555;font-family:inherit;display:flex;align-items:center;gap:4px}
.img-upload-btn:hover{background:#f5f5f0}
#imgUploadInput{display:none}
/* ── 新增：下载按钮样式（不影响原有样式） ── */
.download-btn{padding:4px 10px;border:1px solid #e8e8e4;border-radius:6px;background:transparent;font-size:12px;cursor:pointer;color:#555;font-family:inherit;display:flex;align-items:center;gap:4px}
.download-btn:hover{background:#f5f5f0;color:#4338ca}
.editor-title{padding:16px 20px 8px;font-size:22px;font-weight:600;border:none;outline:none;background:transparent;color:#1a1a1a;font-family:inherit;width:100%}
.editor-tags{padding:4px 20px 8px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;border-bottom:1px solid #f0f0ec}
.etag{font-size:12px;padding:3px 10px;border-radius:99px;background:#ede9fe;color:#4338ca;display:flex;align-items:center;gap:4px}
.etag-rm{cursor:pointer;opacity:0.5;font-size:14px;line-height:1}
.etag-rm:hover{opacity:1}
.tag-input{font-size:13px;border:none;outline:none;background:transparent;color:#888;min-width:100px;font-family:inherit}
.tag-input::placeholder{color:#ccc}
.editor-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
#editorContent{min-height:0;overflow:hidden}
.edit-pane{flex:1;padding:12px 20px;overflow-y:auto;min-height:0}
.edit-pane textarea{width:100%;height:100%;min-height:300px;border:none;outline:none;resize:none;font-size:14px;line-height:1.9;color:#1a1a1a;background:transparent;font-family:'Menlo','Monaco','Courier New',monospace}
.preview-pane{flex:1;padding:16px 24px;overflow-y:auto;display:none;border-left:1px solid #f0f0ec;min-height:0;height:100%}
.preview-pane.show{display:block}
.math-block{overflow-x:auto;margin:12px 0;padding:8px;background:#f9f9ff;border-radius:6px;text-align:center}
.katex-display{margin:0}
.split-view .edit-pane{flex:1}
.split-view .preview-pane{display:block;flex:1}
/* Markdown preview styles */
.preview-pane h1{font-size:22px;font-weight:700;margin:0 0 12px;color:#1a1a1a;border-bottom:2px solid #e8e8e4;padding-bottom:8px}
.preview-pane h2{font-size:18px;font-weight:600;margin:20px 0 8px;color:#1a1a1a;border-bottom:1px solid #f0f0ec;padding-bottom:4px}
.preview-pane h3{font-size:15px;font-weight:600;margin:16px 0 6px;color:#333}
.preview-pane p{margin:0 0 10px;line-height:1.8;color:#333}
.preview-pane ul,.preview-pane ol{margin:0 0 10px 20px;line-height:1.8;color:#333}
.preview-pane li{margin-bottom:3px}
.preview-pane blockquote{border-left:3px solid #a5b4fc;padding:6px 12px;margin:10px 0;background:#f9f9ff;color:#555;border-radius:0 6px 6px 0}
.preview-pane code{background:#f0f0ec;padding:1px 5px;border-radius:4px;font-family:monospace;font-size:13px;color:#d63384}
.preview-pane pre{background:#f5f5f0;padding:12px;border-radius:8px;overflow-x:auto;margin:10px 0}
.preview-pane pre code{background:none;padding:0;color:#1a1a1a}
.preview-pane img{max-width:100%;border-radius:8px;margin:8px 0;box-shadow:0 2px 8px rgba(0,0,0,0.1);display:block}
.preview-pane strong{font-weight:600;color:#1a1a1a}
.preview-pane em{font-style:italic;color:#555}
.preview-pane hr{border:none;border-top:1px solid #e8e8e4;margin:16px 0}
.preview-pane table{width:100%;border-collapse:collapse;margin:10px 0;font-size:13px}
.preview-pane th{background:#f0eefc;padding:7px 10px;text-align:left;font-weight:600;border:1px solid #e0defa}
.preview-pane td{padding:6px 10px;border:1px solid #e8e8e4}
.preview-pane tr:nth-child(even){background:#f9f9ff}
.editor-footer{padding:8px 20px;border-top:1px solid #e8e8e4;display:flex;align-items:center;justify-content:space-between}
.word-count{font-size:12px;color:#bbb}
.footer-btns{display:flex;gap:8px}
.del-btn{padding:5px 12px;border:1px solid #fca5a5;border-radius:7px;background:transparent;color:#ef4444;font-size:13px;cursor:pointer;font-family:inherit}
.del-btn:hover{background:#fef2f2}
.save-btn{padding:5px 16px;background:#4f46e5;color:#fff;border:none;border-radius:7px;font-size:13px;cursor:pointer;font-family:inherit}
.save-btn:hover{background:#4338ca}
.save-btn.saved{background:#10b981}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#ccc;gap:10px;font-size:14px}
.empty svg{width:40px;height:40px;opacity:0.3}
.loading{text-align:center;padding:20px;color:#bbb;font-size:13px}
.toast{position:fixed;bottom:20px;right:20px;background:#1a1a1a;color:#fff;padding:10px 16px;border-radius:8px;font-size:13px;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:100}
.toast.show{opacity:1}
.upload-progress{font-size:11px;color:#6366f1;padding:2px 6px}
/* ── 新增：化学结构样式 ── */
.chem-block{display:inline-block;background:#f9f9ff;border-radius:8px;padding:6px;margin:4px 2px;border:1px solid #e0defa;text-align:center;vertical-align:middle}
.chem-block canvas{display:block;max-width:100%}
.chem-error{color:#ef4444;font-size:12px;font-family:monospace;background:#fef2f2;padding:4px 8px;border-radius:4px;border:1px solid #fca5a5}
.chem-inline-wrap{display:inline-flex;flex-direction:column;align-items:center;background:#f9f9ff;border-radius:8px;border:1px solid #e0defa;padding:4px 6px;margin:2px 4px;vertical-align:middle;cursor:default}
.chem-inline-wrap canvas{display:block}
.chem-label{font-size:10px;color:#888;font-family:monospace;margin-top:2px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sidebar-top">
      <div class="app-title">📚 我的知识库</div>
      <div class="search-box">
        <svg width="14" height="14" fill="none" stroke="#aaa" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" placeholder="搜索笔记..." id="searchInput">
      </div>
    </div>
    <div class="section-label">分类</div>
    <div class="cat-list" id="catList"></div>
    <button class="new-btn" id="newBtn">＋ 新建笔记</button>
  </div>
  <div class="note-list">
    <div class="list-header"><span id="listTitle">全部笔记</span><span id="listCount" style="font-size:12px;color:#bbb"></span></div>
    <div class="note-items" id="noteItems"></div>
  </div>
  <div class="editor" id="editor">
    <div id="emptyState" class="empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
      选择笔记或新建一篇
    </div>
    <div id="editorContent" style="display:none;flex:1;flex-direction:column">
      <div class="toolbar">
        <button class="tb-btn" onclick="ins('**','**')"><b>B</b></button>
        <button class="tb-btn" onclick="ins('*','*')"><i>I</i></button>
        <button class="tb-btn" onclick="insLine('## ')">H2</button>
        <button class="tb-btn" onclick="insLine('### ')">H3</button>
        <button class="tb-btn" onclick="insLine('- ')">列表</button>
        <button class="tb-btn" onclick="insLine('> ')">引用</button>
        <button class="tb-btn" onclick="ins('\`','\`')">代码</button>
        <button class="tb-btn" onclick="insLine('---')">分割线</button>
        <label class="img-upload-btn" title="插入图片">
          🖼 图片
          <input type="file" id="imgUploadInput" accept="image/*" onchange="uploadImage(this)">
        </label>
        <span id="uploadProgress" class="upload-progress"></span>
        <span style="flex:1"></span>
        <button class="download-btn" onclick="downloadPDF()" title="下载为PDF">⬇ 下载PDF</button>
        <button class="tb-btn" id="previewBtn" onclick="togglePreview()">👁 预览</button>
        <button class="tb-btn" id="splitBtn" onclick="toggleSplit()">⬛ 分屏</button>
        <select class="tb-select" id="catSelect">
          <option value="">选择分类</option>
          <option>有机化学</option>
          <option>无机化学</option>
          <option>分析化学</option>
          <option>物理化学</option>
          <option>编程</option>
          <option>数学</option>
          <option>英语</option>
          <option>读书笔记</option>
          <option>其他</option>
        </select>
      </div>
      <input class="editor-title" id="noteTitle" placeholder="笔记标题...">
      <div class="editor-tags" id="editorTags"></div>
      <div class="editor-area" id="editorArea">
        <div class="edit-pane" id="editPane">
          <textarea id="noteContent" placeholder="开始记录你的想法...\n\n支持 Markdown 格式：\n## 标题\n**粗体** *斜体*\n- 列表项\n> 引用\n\n图片：点击工具栏「🖼 图片」上传"></textarea>
        </div>
        <div class="preview-pane" id="previewPane"></div>
      </div>
      <div class="editor-footer">
        <span class="word-count" id="wordCount">0 字</span>
        <div class="footer-btns">
          <button class="del-btn" onclick="deleteNote()">删除</button>
          <button class="save-btn" id="saveBtn" onclick="saveNote()">保存</button>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://jcxxifymtgxcaxmggubi.supabase.co';
const SUPABASE_KEY = 'sb_publishable_K4BcxTkYldQ_0Pn2dtgRcQ_10_U9yEg';
const API = SUPABASE_URL + '/rest/v1/notes';
const STORAGE_API = SUPABASE_URL + '/storage/v1/object';
const HEADERS = {'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY};

let notes=[], currentId=null, currentCat='全部', viewMode='edit';

function toast(msg,dur){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),dur||2000)}

// ── 图片上传 ────────────────────────────────────────────
async function uploadImage(input){
  const file = input.files[0];
  if(!file) return;
  const prog = document.getElementById('uploadProgress');
  prog.textContent = '上传中...';

  const fileName = Date.now() + '_' + file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
  const bucket = 'note-images';

  try {
    const r = await fetch(STORAGE_API + '/' + bucket + '/' + fileName, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY,
        'Content-Type': file.type,
        'x-upsert': 'true'
      },
      body: file
    });

    if(r.ok){
      const publicUrl = SUPABASE_URL + '/storage/v1/object/public/' + bucket + '/' + fileName;
      insertImageMd(publicUrl, file.name);
      prog.textContent = '✓ 上传成功';
      setTimeout(()=>prog.textContent='', 2000);
    } else {
      await insertBase64(file);
      prog.textContent = '✓ 已嵌入（Base64）';
      setTimeout(()=>prog.textContent='', 2000);
    }
  } catch(e) {
    await insertBase64(file);
    prog.textContent = '✓ 已嵌入';
    setTimeout(()=>prog.textContent='', 2000);
  }
  input.value = '';
}

function insertImageMd(url, name){
  const ta = document.getElementById('noteContent');
  const md = '\n![' + (name||'图片') + '](' + url + ')\n';
  const s = ta.selectionStart;
  ta.value = ta.value.slice(0,s) + md + ta.value.slice(s);
  ta.selectionStart = ta.selectionEnd = s + md.length;
  ta.focus();
  updatePreview();
  resetSaveBtn();
}

function insertBase64(file){
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => {
      const md = '\n![' + file.name + '](' + e.target.result + ')\n';
      const ta = document.getElementById('noteContent');
      const s = ta.selectionStart;
      ta.value = ta.value.slice(0,s) + md + ta.value.slice(s);
      ta.selectionStart = ta.selectionEnd = s + md.length;
      ta.focus();
      updatePreview();
      resetSaveBtn();
      resolve();
    };
    reader.readAsDataURL(file);
  });
}

// ── 新增：下载PDF（打印方式，不弹窗直接下载）──────────────
async function downloadPDF(){
  const n = notes.find(x=>x.id===currentId);
  if(!n){toast('请先选择笔记');return;}
  const title = document.getElementById('noteTitle').value || '无标题';
  const htmlBody = mdToHtml(document.getElementById('noteContent').value);

  // 电脑端用 jsPDF 直接下载，手机端用打印
  const isMobile = /Android|iPhone|iPad/i.test(navigator.userAgent);
  if(isMobile){
    const win = window.open('','_blank');
    if(!win){toast('请允许弹出窗口');return;}
    win.document.write(buildPrintHtml(title, htmlBody));
    win.document.close();
    toast('请选择「存储为PDF」');
    return;
  }

  toast('正在生成PDF...');
  try{
    await loadScript('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js');
    await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js');

    const container = document.createElement('div');
    container.style.cssText = 'position:fixed;left:-9999px;top:0;width:794px;background:#fff;padding:48px 56px;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;font-size:14px;line-height:1.8;color:#1a1a1a;box-sizing:border-box;';
    container.innerHTML = `
      <div style="margin-bottom:20px">
        <div style="font-size:22px;font-weight:700;color:#1a1a1a;margin-bottom:6px">${escapeHtml(title)}</div>
        <div style="font-size:12px;color:#aaa">导出时间：${new Date().toLocaleString('zh-CN')}</div>
      </div>
      <hr style="border:none;border-top:1px solid #e8e8e4;margin-bottom:18px">
      <style>
        h1{font-size:20px;font-weight:700;margin:0 0 12px;padding-bottom:8px;border-bottom:2px solid #e8e8e4}
        h2{font-size:17px;font-weight:600;margin:18px 0 8px;padding-bottom:4px;border-bottom:1px solid #f0f0ec}
        h3{font-size:15px;font-weight:600;margin:14px 0 6px;color:#333}
        p{margin:0 0 9px;color:#333}ul,ol{margin:0 0 9px 20px}li{margin-bottom:3px}
        blockquote{border-left:3px solid #a5b4fc;padding:6px 12px;margin:10px 0;background:#f9f9ff;color:#555}
        code{background:#f0f0ec;padding:1px 4px;border-radius:3px;font-family:monospace;font-size:12px;color:#d63384}
        pre{background:#f5f5f0;padding:10px;border-radius:6px;margin:10px 0}
        table{width:100%;border-collapse:collapse;margin:10px 0;font-size:13px}
        th{background:#ede9fe;padding:6px 8px;font-weight:600;border:1px solid #e0defa}
        td{padding:5px 8px;border:1px solid #e8e8e4}tr:nth-child(even){background:#f9f9ff}
        strong{font-weight:600}em{font-style:italic;color:#555}
        hr{border:none;border-top:1px solid #e8e8e4;margin:14px 0}
        img{max-width:100%;border-radius:6px;margin:6px 0;display:block}
      </style>
      <div>${htmlBody}</div>`;
    document.body.appendChild(container);

    const canvas = await html2canvas(container,{scale:2,useCORS:true,backgroundColor:'#ffffff',logging:false});
    document.body.removeChild(container);

    const {jsPDF} = window.jspdf;
    const imgData = canvas.toDataURL('image/jpeg',0.92);
    const pageW = 210, pageH = 297;
    const imgW = pageW;
    const imgH = (canvas.height * imgW) / canvas.width;
    const pdf = new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});

    let yOffset = 0, remaining = imgH;
    while(remaining > 0){
      if(yOffset > 0) pdf.addPage();
      pdf.addImage(imgData,'JPEG',0,-yOffset,imgW,imgH,undefined,'FAST');
      yOffset += pageH;
      remaining -= pageH;
    }

    pdf.save((title+'.pdf').replace(/[\\/:*?"<>|]/g,'_'));
    toast('✓ 已下载 '+title+'.pdf');
  } catch(e){
    console.error(e);
    toast('PDF生成失败，请重试',3000);
  }
}

function loadScript(src){
  return new Promise((resolve,reject)=>{
    if(document.querySelector('script[src="'+src+'"]')){resolve();return;}
    const s=document.createElement('script');
    s.src=src;s.onload=resolve;s.onerror=reject;
    document.head.appendChild(s);
  });
}

function buildPrintHtml(title, htmlBody){
  return `<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"><title>${escapeHtml(title)}</title>

// ── Markdown 渲染 ──────────────────────────────────────
function mdToHtml(md){
  let codeBlocks = [];
  md = md.replace(/```([\s\S]*?)```/g, function(m, c) {
    codeBlocks.push(c.trim());
    return 'CODEBLOCK' + (codeBlocks.length-1) + 'END';
  });

  let inlineCodes = [];
  md = md.replace(/`([^`]+)`/g, function(m, c) {
    inlineCodes.push(c);
    return 'INLINECODE' + (inlineCodes.length-1) + 'END';
  });

  let mathBlocks = [], mathInlines = [];
  md = md.replace(/\$\$([\s\S]+?)\$\$/g, function(m, f) {
    mathBlocks.push(f);
    return 'MATHBLOCK' + (mathBlocks.length-1) + 'END';
  });
  md = md.replace(/\$([^\$\n]+?)\$/g, function(m, f) {
    mathInlines.push(f);
    return 'MATHINLINE' + (mathInlines.length-1) + 'END';
  });

  let tableBlocks = [];
  md = md.replace(/((?:^\|.+\|\s*\n)+)/gm, function(match) {
    var lines = match.trim().split('\n').filter(l => l.trim());
    var result = '<table>';
    var headerDone = false;
    for (var i = 0; i < lines.length; i++) {
      var line = lines[i].trim();
      if (!line) continue;
      if (/^\|[\s\-:]+\|$/.test(line.replace(/[^|\-: ]/g,''))) {
        headerDone = true;
        continue;
      }
      var cells = line.split('|').slice(1,-1).map(c => c.trim());
      if (!headerDone) {
        result += '<thead><tr>' + cells.map(c=>'<th>'+c+'</th>').join('') + '</tr></thead><tbody>';
      } else {
        result += '<tr>' + cells.map(c=>'<td>'+c+'</td>').join('') + '</tr>';
      }
    }
    if (headerDone) result += '</tbody>';
    result += '</table>';
    tableBlocks.push(result);
    return 'TABLEBLOCK' + (tableBlocks.length-1) + 'END\n';
  });

  let h = md
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');

  h = h.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1" style="max-width:100%;border-radius:8px;margin:8px 0;display:block">');
  h = h.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" style="color:#4338ca">$1</a>');

  var lines = h.split('\n');
  var out = [];
  for (var i = 0; i < lines.length; i++) {
    var line = lines[i];
    if (/^#### /.test(line)) {
      out.push('<h4 style="font-size:13px;font-weight:600;margin:12px 0 4px;color:#444">' + line.slice(5) + '</h4>');
    } else if (/^### /.test(line)) {
      out.push('<h3 style="font-size:15px;font-weight:600;margin:16px 0 6px;color:#333">' + line.slice(4) + '</h3>');
    } else if (/^## /.test(line)) {
      out.push('<h2 style="font-size:18px;font-weight:600;margin:20px 0 8px;color:#1a1a1a;border-bottom:1px solid #f0f0ec;padding-bottom:4px">' + line.slice(3) + '</h2>');
    } else if (/^# /.test(line)) {
      out.push('<h1 style="font-size:22px;font-weight:700;margin:0 0 12px;color:#1a1a1a;border-bottom:2px solid #e8e8e4;padding-bottom:8px">' + line.slice(2) + '</h1>');
    } else if (/^> /.test(line)) {
      out.push('<blockquote style="border-left:3px solid #a5b4fc;padding:6px 12px;margin:10px 0;background:#f9f9ff;color:#555">' + line.slice(2) + '</blockquote>');
    } else if (/^- /.test(line)) {
      out.push('<li style="margin-bottom:3px;margin-left:20px">' + line.slice(2) + '</li>');
    } else if (/^\d+\. /.test(line)) {
      out.push('<li style="margin-bottom:3px;margin-left:20px">' + line.slice(line.indexOf('.')+2) + '</li>');
    } else if (/^---/.test(line)) {
      out.push('<hr style="border:none;border-top:1px solid #e8e8e4;margin:16px 0">');
    } else if (line.trim()) {
      out.push('<p style="margin:0 0 10px;line-height:1.8;color:#333">' + line + '</p>');
    } else {
      out.push('');
    }
  }
  h = out.join('\n');

  // 还原
  tableBlocks.forEach((b, i) => { h = h.replace('TABLEBLOCK' + i + 'END', b); });
  mathBlocks.forEach((b, i) => { h = h.replace('MATHBLOCK' + i + 'END', '<div class="math-block">$$' + b + '$$</div>'); });
  mathInlines.forEach((b, i) => { h = h.replace('MATHINLINE' + i + 'END', '$' + b + '$'); });
  inlineCodes.forEach((b, i) => { h = h.replace('INLINECODE' + i + 'END', '<code>' + b + '</code>'); });

  codeBlocks.forEach((b, i) => {
    if (b.startsWith('SMILES') || b.startsWith('smiles')) {
      const smilesStr = b.replace(/^(SMILES|smiles)[\s\n]*/, '').trim();
      h = h.replace('CODEBLOCK' + i + 'END', '<div class="chem-block" data-smiles="' + smilesStr + '"></div>');
    } else {
      h = h.replace('CODEBLOCK' + i + 'END', '<pre><code>' + b + '</code></pre>');
    }
  });

  return h;
}

function escapeHtml(str) {
  if(!str) return '';
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
